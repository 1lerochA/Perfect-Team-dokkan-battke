<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Box - Dokkan Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .unit-card {
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .unit-card.in-box {
            outline: 3px solid #27ae60;
            outline-offset: 2px;
            box-shadow: 0 0 15px rgba(39, 174, 96, 0.5);
        }
        .unit-card.in-box:hover { transform: scale(1.15) !important; }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat-item span { color: var(--accent-gold); font-size: 1.3rem; font-family: 'Bangers', cursive; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🔮 Générateur</a>
        <a href="box.html" class="active">🎒 Ma Box</a>
        <a href="teams.html">⭐ Mes Équipes</a>
    </nav>

    <div class="container">
        <h1 class="dokkan-font" style="font-size:3.5rem;color:var(--accent-gold);text-shadow:3px 3px 0 #000;">MON INVENTAIRE</h1>
        <p style="color:#888;font-style:italic;margin-bottom:30px;">Clique sur une unité pour l'ajouter ou la retirer de ta box.</p>

        <div class="controls">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Rechercher (ex: UI Goku, Beast Gohan...)">
            <div class="filter-group">
                <button class="btn-type active" data-type="ALL" style="background:#333;">TOUT</button>
                <button class="btn-type bg-agi" data-type="AGI">AGI</button>
                <button class="btn-type bg-tec" data-type="TEC">TEC</button>
                <button class="btn-type bg-int" data-type="INT">INT</button>
                <button class="btn-type bg-pui" data-type="PUI">PUI</button>
                <button class="btn-type bg-end" data-type="END">END</button>
            </div>
            <div class="filter-group" style="margin-top:10px;">
                <button class="btn-type active" data-rarity="ALL" style="background:#555;font-size:0.8rem;">TOUTES RARETÉS</button>
                <button class="btn-type" data-rarity="LR" style="background:linear-gradient(135deg,#7a4e00,#ffd700,#b8860b);font-size:0.8rem;">LR</button>
                <button class="btn-type" data-rarity="UR" style="background:#333;border:1px solid #888;font-size:0.8rem;">UR</button>
                <button class="btn-type" data-rarity="SSR" style="background:#7a5900;font-size:0.8rem;">SSR</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">DANS LA BOX : <span id="count-box">0</span></div>
            <div class="stat-item">LR : <span id="count-lr">0</span></div>
            <div class="stat-item">UR : <span id="count-ur">0</span></div>
            <div class="stat-item">SSR : <span id="count-ssr">0</span></div>
        </div>

        <div id="dokkan-grid" class="dokkan-grid"></div>
    </div>

    <script src="data.js"></script>
    <script src="cards.js"></script>
    <script>
        let maBoxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];
        let currentTypeFilter = 'ALL';
        let currentRarityFilter = 'ALL';
        let searchQuery = '';

        const grid = document.getElementById('dokkan-grid');

        function render() {
            grid.innerHTML = '';
            const sorted = [...dokkanCharacters].sort((a, b) => {
                const aO = maBoxIds.includes(a.id), bO = maBoxIds.includes(b.id);
                if (aO && !bO) return -1;
                if (!aO && bO) return 1;
                const order = ['LR','UR','SSR','SR','R','N'];
                return order.indexOf(a.rarity) - order.indexOf(b.rarity);
            });

            const filtered = sorted.filter(c => {
                const mt = currentTypeFilter === 'ALL' || c.type === currentTypeFilter;
                const mr = currentRarityFilter === 'ALL' || c.rarity === currentRarityFilter;
                const ms = c.name.toLowerCase().includes(searchQuery.toLowerCase());
                return mt && mr && ms;
            });

            const LIMIT = 60;
            const toDisplay = filtered.slice(0, LIMIT);

            if (filtered.length > LIMIT) {
                const info = document.createElement('div');
                info.style.cssText = "grid-column:1/-1;color:#888;font-style:italic;margin:10px 0;font-size:0.9rem;";
                info.textContent = `${LIMIT} premiers sur ${filtered.length}. Affine ta recherche pour voir plus.`;
                grid.appendChild(info);
            }

            toDisplay.forEach(char => {
                const isInBox = maBoxIds.includes(char.id);
                const tmp = document.createElement('div');
                tmp.innerHTML = createDokkanCard(char, { isInBox });
                grid.appendChild(tmp.firstElementChild);
            });

            updateStats();
        }

        function updateStats() {
            const owned = dokkanCharacters.filter(c => maBoxIds.includes(c.id));
            document.getElementById('count-box').textContent = maBoxIds.length;
            document.getElementById('count-lr').textContent = owned.filter(c => c.rarity === 'LR').length;
            document.getElementById('count-ur').textContent = owned.filter(c => c.rarity === 'UR').length;
            document.getElementById('count-ssr').textContent = owned.filter(c => c.rarity === 'SSR').length;
        }

        window.handleUnitClick = function(id) {
            if (maBoxIds.includes(id)) {
                maBoxIds = maBoxIds.filter(b => b !== id);
            } else {
                maBoxIds.push(id);
            }
            localStorage.setItem('dokkanBox', JSON.stringify(maBoxIds));
            
            const oldCard = document.getElementById('unit-' + id);
            if (oldCard) {
                const char = dokkanCharacters.find(c => c.id === id);
                const isInBox = maBoxIds.includes(id);
                
                // On crée une nouvelle carte avec le bon état (pour avoir le badge BOX)
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = createDokkanCard(char, { isInBox });
                const newCard = tempDiv.firstElementChild;
                
                // On remplace l'ancienne par la nouvelle
                oldCard.parentNode.replaceChild(newCard, oldCard);
                updateStats();
            }
        };

        document.getElementById('searchInput').addEventListener('input', e => {
            searchQuery = e.target.value;
            render();
        });

        document.querySelectorAll('[data-type]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTypeFilter = btn.dataset.type;
                render();
            });
        });

        document.querySelectorAll('[data-rarity]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-rarity]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRarityFilter = btn.dataset.rarity;
                render();
            });
        });

        render();
    </script>
</body>
</html>
