<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Box - Dokkan Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat-item span { color: var(--accent-gold); font-size: 1.3rem; font-family: 'Bangers', cursive; }

        .btn-add {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            border: none;
            color: white;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            padding: 15px 35px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(39,174,96,0.4);
            display: block;
            margin: 0 auto 30px auto;
        }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(39,174,96,0.6); }

        .box-unit-wrapper { position: relative; display: inline-block; }
        .remove-btn {
            position: absolute;
            top: -5px; left: -5px;
            background: #e74c3c; color: white;
            border: 2px solid #111; border-radius: 50%;
            width: 24px; height: 24px;
            font-size: 12px; font-weight: bold;
            cursor: pointer; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .remove-btn:hover { background: #c0392b; transform: scale(1.1); }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); z-index: 2000;
            backdrop-filter: blur(4px); justify-content: center;
            align-items: flex-start; padding: 40px 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #111820; border: 2px solid var(--accent-gold);
            border-radius: 20px; padding: 30px;
            max-width: 800px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative;
        }
        .close-modal {
            position: absolute; top: 15px; right: 20px;
            background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; transition: 0.2s;
        }
        .close-modal:hover { color: #e74c3c; transform: rotate(90deg); }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 16px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="dokkan-font" style="font-size:3.5rem;color:var(--accent-gold);text-shadow:3px 3px 0 #000;">MON INVENTAIRE</h1>
        <p style="color:#888;font-style:italic;margin-bottom:30px;">Voici ta collection personnelle. Génère des équipes avec ces unités !</p>

        <button class="btn-add" onclick="openModal()">➕ AJOUTER DES PERSONNAGES</button>

        <div class="stats-bar">
            <div class="stat-item">DANS LA BOX : <span id="count-box">0</span></div>
            <div class="stat-item">LR : <span id="count-lr">0</span></div>
            <div class="stat-item">UR : <span id="count-ur">0</span></div>
            <div class="stat-item">SSR : <span id="count-ssr">0</span></div>
        </div>

        <div class="controls" style="margin-bottom: 20px;">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Rechercher dans ma box...">
            <div class="filter-group">
                <button class="btn-type active" data-type="ALL" style="background:#333;">TOUT</button>
                <button class="btn-type bg-agi" data-type="AGI">AGI</button>
                <button class="btn-type bg-tec" data-type="TEC">TEC</button>
                <button class="btn-type bg-int" data-type="INT">INT</button>
                <button class="btn-type bg-pui" data-type="PUI">PUI</button>
                <button class="btn-type bg-end" data-type="END">END</button>
            </div>
        </div>

        <div id="dokkan-grid" class="dokkan-grid"></div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModal()">✕</button>
            <h2 class="dokkan-font" style="color:var(--accent-gold); font-size:2rem; margin-top:0;">BASE DE DONNÉES</h2>
            <p style="color:#aaa; font-size:0.9rem; margin-bottom:15px;">Clique sur un personnage pour l'ajouter à ta box.</p>
            <input type="text" id="modal-search" class="search-bar" placeholder="🔍 Rechercher (ex: Freezer, UI Goku...)" style="margin-bottom:0;">
            <div id="modal-grid" class="modal-grid"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="nav.js"></script>
    <script src="cards.js?v=999"></script>
    <script>

        let maBoxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];
        maBoxIds = maBoxIds.filter(id => dokkanCharacters.some(char => char.id === id));
        localStorage.setItem('dokkanBox', JSON.stringify(maBoxIds));

        let currentTypeFilter = 'ALL';
        let searchQuery = '';
        let modalQuery = '';

        const grid = document.getElementById('dokkan-grid');

        function renderBox() {
            grid.innerHTML = '';
            
            let ownedChars = dokkanCharacters.filter(c => maBoxIds.includes(c.id));

            ownedChars = ownedChars.filter(c => {
                const mt = currentTypeFilter === 'ALL' || c.type === currentTypeFilter;
                const ms = c.name.toLowerCase().includes(searchQuery.toLowerCase());
                return mt && ms;
            });

            const order = ['LR','UR','SSR','SR','R','N'];
            ownedChars.sort((a, b) => order.indexOf(a.rarity) - order.indexOf(b.rarity));

            if (ownedChars.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#888;">Ta box est vide (ou aucun personnage ne correspond au filtre).</p>';
            }

            ownedChars.forEach(char => {
                const wrapper = document.createElement('div');
                wrapper.className = 'box-unit-wrapper';

                const tmp = document.createElement('div');
                tmp.innerHTML = createDokkanCard(char, { size: 'md' });
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.textContent = '✕';
                removeBtn.onclick = () => removeFromBox(char.id);

                wrapper.appendChild(tmp.firstElementChild);
                wrapper.appendChild(removeBtn);
                grid.appendChild(wrapper);
            });

            updateStats();
        }

       function updateStats() {
            const owned = dokkanCharacters.filter(c => maBoxIds.includes(c.id));
            document.getElementById('count-box').textContent = owned.length;
            document.getElementById('count-lr').textContent = owned.filter(c => c.rarity === 'LR').length;
            document.getElementById('count-ur').textContent = owned.filter(c => c.rarity === 'UR').length;
            document.getElementById('count-ssr').textContent = owned.filter(c => c.rarity === 'SSR').length;
        }

        function removeFromBox(id) {
            maBoxIds = maBoxIds.filter(b => b !== id);
            localStorage.setItem('dokkanBox', JSON.stringify(maBoxIds));
            renderBox();
        }

        function openModal() {
            document.getElementById('modal').classList.add('open');
            document.getElementById('modal-search').value = '';
            modalQuery = '';
            renderModal();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            renderBox(); 
        }

        function renderModal() {
            const modalGrid = document.getElementById('modal-grid');
            modalGrid.innerHTML = '';

            let pool = dokkanCharacters.filter(c => !maBoxIds.includes(c.id));

            if (modalQuery.length > 1) {
                pool = pool.filter(c => c.name.toLowerCase().includes(modalQuery.toLowerCase()));
            }

            const toDisplay = pool.slice(0, 50);

            toDisplay.forEach(char => {
                const isInBox = maBoxIds.includes(char.id);
                const tmp = document.createElement('div');
                
                tmp.innerHTML = createDokkanCard(char, { isInBox: isInBox });
                const cardEl = tmp.firstElementChild;
                
                cardEl.style.cursor = 'pointer';
                cardEl.onclick = () => toggleInBoxFromModal(char.id);
                
                modalGrid.appendChild(cardEl);
            });
            
            if (pool.length === 0) {
                modalGrid.innerHTML = '<p style="color:#888; grid-column:1/-1;">Aucun personnage trouvé.</p>';
            }
        }

        function toggleInBoxFromModal(id) {
            const isAdding = !maBoxIds.includes(id);
            
            if (isAdding) {
                maBoxIds.push(id);
            } else {
                maBoxIds = maBoxIds.filter(b => b !== id);
            }
            localStorage.setItem('dokkanBox', JSON.stringify(maBoxIds));
            
            const char = dokkanCharacters.find(c => c.id === id);
            const oldCard = document.querySelector(`#modal-grid #unit-${id}`);
            
            if (oldCard) {
                const tmp = document.createElement('div');
                tmp.innerHTML = createDokkanCard(char, { isInBox: isAdding });
                const newCard = tmp.firstElementChild;
                
                newCard.style.cursor = 'pointer';
                newCard.onclick = () => toggleInBoxFromModal(id);
                
                oldCard.parentNode.replaceChild(newCard, oldCard);
            }

            updateStats(); 
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            searchQuery = e.target.value;
            renderBox();
        });

        document.getElementById('modal-search').addEventListener('input', e => {
            modalQuery = e.target.value;
            renderModal();
        });

        document.querySelectorAll('.filter-group .btn-type').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-group .btn-type').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTypeFilter = btn.dataset.type;
                renderBox();
            });
        });

        document.getElementById('modal').addEventListener('click', e => {
            if (e.target === document.getElementById('modal')) closeModal();
        });

        window.handleUnitClick = function() {
            console.log("Préparation de la future fiche détaillée !");
        };

        renderBox();
    </script>
</body>
</html>
