<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Équipes - Dokkan Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .team-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
            position: relative;
        }
        .team-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }

        .team-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .team-title-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            color: var(--accent-gold);
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            letter-spacing: 2px;
            outline: none;
            transition: 0.2s;
            min-width: 200px;
            width: 100%;
            max-width: 500px;
        }
        .team-title-input:focus { border-bottom-color: var(--accent-gold); }

        .team-meta { font-size: 0.8rem; color: #888; margin-top: 4px; }

        .team-units-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .team-unit-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .team-unit-wrapper .unit-label {
            font-size: 8px;
            color: #888;
            text-align: center;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .remove-unit-btn {
            background: rgba(231,76,60,0.7);
            border: none;
            color: white;
            font-size: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .remove-unit-btn:hover { background: #e74c3c; transform: scale(1.1); }

        .add-unit-slot {
            width: 90px;
            height: 90px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .add-unit-slot:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(243,156,18,0.05); }

        .team-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
            font-family: 'Bangers', cursive;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-sm:hover { transform: translateY(-2px); }
        .btn-delete { background: rgba(231,76,60,0.7); }
        .btn-delete:hover { background: #e74c3c; }
        .btn-save-name { background: rgba(52,152,219,0.7); }
        .btn-save-name:hover { background: #3498db; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .modal-overlay.open { display: flex; }

        .modal-box {
            background: #111820;
            border: 2px solid var(--accent-gold);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-box h2 { margin-top: 0; color: var(--accent-gold); font-family: 'Bangers', cursive; font-size: 2rem; letter-spacing: 2px; }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }
        .close-modal:hover { opacity: 1; transform: rotate(90deg); }

        .btn-create-team {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            color: #000;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            padding: 18px 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(243,156,18,0.4);
            text-transform: uppercase;
            display: block;
            margin: 0 auto 40px auto;
        }
        .btn-create-team:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(243,156,18,0.6); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state .icon { font-size: 4rem; margin-bottom: 15px; }
        .empty-state p { font-size: 1.1rem; line-height: 1.7; }

        .section-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin: 40px 0;
        }

        .saved-count { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="dokkan-font" style="font-size:3.5rem;color:var(--accent-gold);text-shadow:3px 3px 0 #000;">MES ÉQUIPES</h1>
        <p style="color:#888;font-style:italic;margin-bottom:40px;">Retrouve tes équipes sauvegardées et crée les tiennes.</p>

        <button class="btn-create-team" onclick="createCustomTeam()">➕ CRÉER UNE NOUVELLE ÉQUIPE</button>

        <div id="teams-container">
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModal()">✕</button>
            <h2>CHOISIR UNE UNITÉ</h2>
            <input type="text" id="modal-search" class="search-bar" placeholder="🔍 Rechercher..." style="margin-bottom:0;">
            <div id="modal-grid" class="modal-grid"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="nav.js"></script>
    <script src="cards.js?v=999"></script>
    <script>
        let savedTeams = JSON.parse(localStorage.getItem('dokkanSavedTeams')) || [];
        let modalTargetTeamId = null;
        let modalSearchQuery = '';

        function persist() {
            localStorage.setItem('dokkanSavedTeams', JSON.stringify(savedTeams));
        }

        function renderTeams() {
            const container = document.getElementById('teams-container');
            container.innerHTML = '';

            if (savedTeams.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🐉</div>
                        <p>Aucune équipe sauvegardée pour l'instant.<br>
                        Génère une équipe depuis le <a href="index.html" style="color:var(--accent-gold)">Générateur</a>
                        et clique ❤️ pour la sauvegarder,<br>ou crée-en une manuellement ci-dessus !</p>
                    </div>`;
                return;
            }

            const countEl = document.createElement('p');
            countEl.className = 'saved-count';
            countEl.textContent = savedTeams.length + ' équipe(s) sauvegardée(s)';
            container.appendChild(countEl);

            savedTeams.forEach(team => {
                container.appendChild(buildTeamCard(team));
            });
        }

        function buildTeamCard(team) {
            const card = document.createElement('div');
            card.className = 'team-card';
            card.id = 'team-card-' + team.id;

            const header = document.createElement('div');
            header.className = 'team-card-header';
            header.innerHTML = `
                <div style="flex:1;min-width:200px;">
                    <input class="team-title-input" value="${escapeHtml(team.name)}"
                           onchange="renameTeam(${team.id}, this.value)" />
                    <div class="team-meta">
                        ${team.source ? '🔮 ' + team.source + ' · ' : ''}
                        📅 ${team.date || ''}
                    </div>
                </div>`;
            card.appendChild(header);

            const row = document.createElement('div');
            row.className = 'team-units-row';
            row.id = 'units-row-' + team.id;
            renderUnitsRow(row, team);
            card.appendChild(row);

            const actions = document.createElement('div');
            actions.className = 'team-actions';
            actions.innerHTML = `
                <button style="background:linear-gradient(135deg, #3498db, #2980b9); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; font-family:'Bangers', cursive; font-size:1.1rem;" onclick="analyzeTeam('${team.id}')">📊 ANALYSER</button>
                <button class="btn-sm btn-delete" onclick="deleteTeam(${team.id})">🗑️ Supprimer</button>`;
            card.appendChild(actions);

            return card;
        }

        function renderUnitsRow(rowEl, team) {
            rowEl.innerHTML = '';

            const myBoxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];
            const allIds = [team.leaderId, ...(team.memberIds || [])].filter(Boolean);

            allIds.forEach((charId, index) => {
                const char = dokkanCharacters.find(c => c.id === charId);
                if (!char) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'team-unit-wrapper';

                const tmp = document.createElement('div');
                tmp.innerHTML = createDokkanCard(char, { isInBox: false });
                const cardEl = tmp.firstElementChild;
                cardEl.onclick = () => {
                    if (typeof handleUnitClick === 'function') handleUnitClick(char.id);
                };
                cardEl.style.cursor = 'pointer';
                
                wrapper.appendChild(cardEl);

                const label = document.createElement('div');
                label.className = 'unit-label';
                label.textContent = index === 0 ? '⭐ Leader' : char.name;
                wrapper.appendChild(label);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-unit-btn';
                removeBtn.title = 'Retirer';
                removeBtn.textContent = '✕';
                removeBtn.onclick = () => removeUnitFromTeam(team.id, charId, index === 0);
                wrapper.appendChild(removeBtn);

                rowEl.appendChild(wrapper);
            });

            if (allIds.length < 7) {
                const slot = document.createElement('div');
                slot.className = 'add-unit-slot';
                slot.title = 'Ajouter une unité';
                slot.textContent = '+';
                slot.onclick = () => openModal(team.id);
                rowEl.appendChild(slot);
            }
        }

        function renameTeam(teamId, newName) {
            const team = savedTeams.find(t => t.id === teamId);
            if (team) { team.name = newName; persist(); }
        }

        function deleteTeam(teamId) {
            if (!confirm('Supprimer cette équipe ?')) return;
            savedTeams = savedTeams.filter(t => t.id !== teamId);
            persist();
            renderTeams();
        }

        function removeUnitFromTeam(teamId, charId, isLeader) {
            const team = savedTeams.find(t => t.id === teamId);
            if (!team) return;
            if (isLeader) {
                team.leaderId = null;
            } else {
                team.memberIds = (team.memberIds || []).filter(id => id !== charId);
            }
            persist();
            const rowEl = document.getElementById('units-row-' + teamId);
            if (rowEl) renderUnitsRow(rowEl, team);
        }

        function createCustomTeam() {
            const newTeam = {
                id: Date.now(),
                name: 'Ma nouvelle équipe',
                leaderId: null,
                memberIds: [],
                source: 'Personnalisée',
                date: new Date().toLocaleDateString('fr-FR')
            };
            savedTeams.unshift(newTeam);
            persist();
            renderTeams();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openModal(teamId) {
            modalTargetTeamId = teamId;
            modalSearchQuery = '';
            document.getElementById('modal-search').value = '';
            document.getElementById('modal').classList.add('open');
            renderModalGrid('');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            modalTargetTeamId = null;
        }
        
        function checkLeaderBoost(leader, candidateUnit) {
            if (!leader || !leader.leaderSkill) return false;
            let getsBoost = false;
            const catRegex = /"([^"]+)"/g;
            let match;
            while ((match = catRegex.exec(leader.leaderSkill)) !== null) {
                if (candidateUnit.categories && candidateUnit.categories.includes(match[1])) getsBoost = true;
            }
            if (leader.leaderSkill.includes("Super Type") && candidateUnit.alignment === "SUPER") getsBoost = true;
            if (leader.leaderSkill.includes("Extreme Type") && candidateUnit.alignment === "EXTRÊME") getsBoost = true;
            if (leader.leaderSkill.includes("All Types")) getsBoost = true;
            return getsBoost;
        }

        function calculateSynergy(existingTeamObjects, candidateUnit, leader, isFriendSlot) {
            let score = 0;

            if (existingTeamObjects.length > 0) {
                let totalLinks = 0;
                existingTeamObjects.forEach(member => {
                    if (member.links && candidateUnit.links) {
                        totalLinks += candidateUnit.links.filter(link => member.links.includes(link)).length;
                    }
                });
                let avgLinks = totalLinks / existingTeamObjects.length;
                score += (avgLinks * 5); 
            }

            if (isFriendSlot && leader && candidateUnit.id === leader.id) {
                score += 500; 
            }

            const textToCheck = ((candidateUnit.passive || "") + " " + (candidateUnit.activeSkill || "")).toLowerCase();
            if (/\b(revive|revives|survives|survive|k\.o\.|standby|domain)\b/i.test(textToCheck)) {
                score += 3; 
            } else if (candidateUnit.activeSkill && candidateUnit.activeSkill !== "Aucun Active Skill") {
                score += 1;
            }

            return score;
        }

        function renderModalGrid(query) {
            const gridEl = document.getElementById('modal-grid');
            gridEl.innerHTML = '';

            const myBoxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];
            
            const team = savedTeams.find(t => t.id === modalTargetTeamId);
            const leader = team && team.leaderId ? dokkanCharacters.find(c => c.id === team.leaderId) : null;
            
            const currentMemberIds = team ? [team.leaderId, ...(team.memberIds || [])].filter(Boolean) : [];
            const isFriendSlot = team && team.memberIds && team.memberIds.length === 5;

            const existingTeamObjects = currentMemberIds.map(id => dokkanCharacters.find(c => c.id === id)).filter(Boolean);

            let pool = query.length > 1
                ? dokkanCharacters.filter(c => c.name.toLowerCase().includes(query.toLowerCase()))
                : [...dokkanCharacters];

            if (!isFriendSlot) {
                pool = pool.filter(c => !currentMemberIds.includes(c.id));
            }

            if (leader) {
                pool = pool.filter(c => checkLeaderBoost(leader, c) || c.id === leader.id); 
            }

            if (leader) {
                pool.sort((a, b) => calculateSynergy(existingTeamObjects, b, leader, isFriendSlot) - calculateSynergy(existingTeamObjects, a, leader, isFriendSlot));
            } else {
                pool.sort((a, b) => {
                    let scoreA = a.rarity === 'LR' ? 10000 : (a.rarity === 'UR' ? 5000 : 0);
                    let scoreB = b.rarity === 'LR' ? 10000 : (b.rarity === 'UR' ? 5000 : 0);
                    scoreA += Number(a.latestUpdateYear) || 2015;
                    scoreB += Number(b.latestUpdateYear) || 2015;
                    if (scoreA === scoreB) return Number(b.id) - Number(a.id);
                    return scoreB - scoreA; 
                });
            }

            pool = pool.slice(0, 25);

            pool.forEach(char => {
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.alignItems = 'center';
                wrapper.style.gap = '8px';

                const showBadge = myBoxIds.includes(char.id); 
                
                const tmp = document.createElement('div');
                tmp.innerHTML = createDokkanCard(char, { isInBox: showBadge });
                const cardEl = tmp.firstElementChild;
                cardEl.onclick = () => addUnitToTeam(char.id);
                cardEl.style.cursor = 'pointer';
                
                wrapper.appendChild(cardEl);

                if (existingTeamObjects.length > 0) {
                    let totalSharedLinks = 0;
                    existingTeamObjects.forEach(member => {
                        if (member.links && char.links) {
                            totalSharedLinks += char.links.filter(l => member.links.includes(l)).length;
                        }
                    });
                    
                    let avgLinks = (totalSharedLinks / existingTeamObjects.length).toFixed(1);
                    
                    const linksText = document.createElement('div');
                    linksText.style.fontFamily = "'Bangers', cursive";
                    linksText.style.fontSize = '0.9rem';
                    linksText.style.letterSpacing = '1px';
                    linksText.style.color = avgLinks >= 4 ? '#e74c3c' : (avgLinks >= 2.5 ? '#f39c12' : '#aaa');
                    linksText.innerHTML = `🔗 ${avgLinks} liens`;
                    
                    wrapper.appendChild(linksText);
                }

                gridEl.appendChild(wrapper);
            });

            if (pool.length === 0) {
                gridEl.innerHTML = '<p style="color:#888;grid-column:1/-1;text-align:center;">Aucun personnage trouvé pour ce Leader Skill.<br>Essaie de changer de Leader.</p>';
            }
        }

        document.getElementById('modal-search').addEventListener('input', e => {
            modalSearchQuery = e.target.value;
            renderModalGrid(modalSearchQuery);
        });

        document.getElementById('modal').addEventListener('click', e => {
            if (e.target === document.getElementById('modal')) closeModal();
        });

        function addUnitToTeam(charId) {
            const team = savedTeams.find(t => t.id === modalTargetTeamId);
            if (!team) return;

            if (!team.leaderId) {
                team.leaderId = charId;
            } else {
                if (!team.memberIds) team.memberIds = [];
                const isFriendSlot = team.memberIds.length === 5; 
                
                if (team.memberIds.length < 6) {
                    const isDuplicate = team.memberIds.includes(charId) || charId === team.leaderId;
                    
                    if (!isDuplicate || isFriendSlot) {
                        team.memberIds.push(charId);
                    } else {
                        alert("Pas de doublon autorisé dans l'équipe principale ! (Seul le dernier emplacement 'Ami' peut être un doublon)");
                        return;
                    }
                }
            }

            persist();
            closeModal();
            const rowEl = document.getElementById('units-row-' + team.id);
            if (rowEl) renderUnitsRow(rowEl, team);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        const analyzerHTML = `
        <div id="analyzer-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; backdrop-filter:blur(10px); justify-content:center; align-items:center; padding:20px;">
            <div style="background:#111820; border:2px solid #3498db; border-radius:20px; width:100%; max-width:800px; max-height:90vh; overflow-y:auto; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.9); padding:40px;">
                <button onclick="closeAnalyzer()" style="position:absolute; top:20px; right:25px; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:1.5rem; cursor:pointer; width:40px; height:40px; border-radius:50%; transition:0.2s;">✕</button>
                
                <div style="text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:20px; margin-bottom:30px;">
                    <h2 style="font-family:'Bangers', cursive; font-size:3rem; color:#3498db; margin:0; letter-spacing:2px;">📊 RAPPORT DU COACH DOKKAN</h2>
                    <p style="color:#aaa; font-style:italic; margin-top:5px;" id="analyzer-team-name"></p>
                </div>
                
                <div id="analyzer-content" style="display:flex; flex-direction:column; gap:20px;">
                    </div>
            </div>
        </div>
        `;
        document.body.insertAdjacentHTML('beforeend', analyzerHTML);

        window.closeAnalyzer = function() {
            document.getElementById('analyzer-modal').style.display = 'none';
        };

        window.analyzeTeam = function(teamId) {
            const savedTeams = JSON.parse(localStorage.getItem('dokkanSavedTeams')) || [];
            const team = savedTeams.find(t => t.id == teamId); 
            if (!team) return;

            const leader = dokkanCharacters.find(c => c.id === team.leaderId);
            const members = team.memberIds.map(id => dokkanCharacters.find(c => c.id === id)).filter(c => c);

            if (!leader) {
                alert("Leader introuvable pour cette équipe !");
                return;
            }

            document.getElementById('analyzer-team-name').textContent = team.name;

            let tankCount = 0;
            let supportCount = 0;
            let totalLinks = 0;
            let offLeaderCatCount = 0;
            let fullTeam = [leader, ...members];

            let leaderCats = [];
            if (leader.leaderSkill) {
                const catRegex = /"([^"]+)"/g;
                let match;
                while ((match = catRegex.exec(leader.leaderSkill)) !== null) {
                    leaderCats.push(match[1]);
                }
            }

            fullTeam.forEach(m => {
                let isCovered = false;
                
                if (m.id === leader.id) {
                    isCovered = true;
                } 
                else if (leaderCats.length > 0) {
                    leaderCats.forEach(c => {
                        if (m.categories && m.categories.includes(c)) isCovered = true;
                    });
                    if (leader.leaderSkill.includes("Super Type") && m.alignment === "SUPER") isCovered = true;
                    if (leader.leaderSkill.includes("Extreme Type") && m.alignment === "EXTRÊME") isCovered = true;
                    if (leader.leaderSkill.includes("All Types")) isCovered = true;
                } 
                else {
                    isCovered = true; 
                }

                if (!isCovered) offLeaderCatCount++; 
            });

            members.forEach(m => {
                let isCovered = false;
                if (leaderCats.length > 0) {
                    leaderCats.forEach(c => {
                        if (m.categories.includes(c) || m.name.toLowerCase().includes(c.toLowerCase())) isCovered = true;
                    });
                    if (leader.leaderSkill.includes("Super Type") && m.alignment === "SUPER") isCovered = true;
                    if (leader.leaderSkill.includes("Extreme Type") && m.alignment === "EXTRÊME") isCovered = true;
                    if (leader.leaderSkill.includes("All Types")) isCovered = true;
                    
                    if (!isCovered) offLeaderCatCount++; 
                }
            });

            fullTeam.forEach(m => {
                if (m.roles && m.roles.includes("TANK")) tankCount++;
                if (m.roles && m.roles.includes("SUPPORT")) supportCount++;
            });

            for (let x = 0; x < fullTeam.length; x++) {
                for (let y = x + 1; y < fullTeam.length; y++) {
                    if (fullTeam[x].links && fullTeam[y].links) {
                        totalLinks += fullTeam[x].links.filter(l => fullTeam[y].links.includes(l)).length;
                    }
                }
            }

            let commentsHTML = "";
            let modeConseille = "";
            let modeCouleur = "";
            let modeTitre = "";

            if (offLeaderCatCount > 0) {
                modeTitre = "Mode Histoire & Quêtes";
                modeConseille = "Cette équipe n'est pas optimisée. Reste sur les événements très faciles pour le moment.";
                modeCouleur = "#888";
            } else if (tankCount >= 3 && totalLinks >= 80) {
                modeTitre = "💥 Red Zone, Supreme Spectacle & All-Out Battles";
                modeConseille = "Tu as une défense de fer et une énorme synergie. Cette équipe est taillée pour détruire le contenu le plus difficile du jeu actuel !";
                modeCouleur = "#e74c3c";
            } else if (totalLinks >= 100 && tankCount <= 1) {
                modeTitre = "⚡ Super Battle Road (SBR / ESBR)";
                modeConseille = "Une équipe 'Blitz' ! Tu vas frapper extrêmement fort d'entrée de jeu, parfait pour les combats courts du SBR, mais trop fragile pour les combats longs.";
                modeCouleur = "#9b59b6";
            } else if (tankCount >= 2 && totalLinks >= 50) {
                modeTitre = "🐉 Rush de Boss & Événements Dokkan";
                modeConseille = "Une équipe très solide. Elle passera tous les événements classiques et les niveaux de difficulté intermédiaires sans transpirer.";
                modeCouleur = "#f39c12";
            } else {
                modeTitre = "⚔️ Niveaux Z-Hard / Super";
                modeConseille = "L'équipe manque un peu de liant ou de défense pour le vrai Endgame, mais fera largement l'affaire pour farmer des médailles.";
                modeCouleur = "#2ecc71";
            }

            commentsHTML += createAnalysisBlock("🎯", "Radar de Difficulté", `<b>Événement recommandé : ${modeTitre}</b><br>${modeConseille}`, modeCouleur);

            if (offLeaderCatCount > 0) {
                commentsHTML += createAnalysisBlock("C", "Alerte de Commandement", `Catastrophe ! <b>${offLeaderCatCount} personnage(s)</b> joue hors du Leader Skill. Ils vont se faire pulvériser au premier tour.`, "#e74c3c");
            } else {
                commentsHTML += createAnalysisBlock("Z", "Cohésion Parfaite", `Le Leader Skill enveloppe toute l'équipe. Tout le monde part au combat avec le maximum de statistiques !`, "#2ecc71");
            }

            if (totalLinks >= 120) {
                commentsHTML += createAnalysisBlock("Z", "Toile de Ki Absolue", `<b>${totalLinks} liens partagés.</b> C'est effrayant. Les Attaques Spéciales Ultimes vont partir toutes seules sans même toucher de sphères de Ki !`, "#e74c3c");
            } else if (totalLinks >= 80) {
                commentsHTML += createAnalysisBlock("S", "Excellente Synergie", `<b>${totalLinks} liens partagés.</b> L'équipe tourne comme une horloge suisse. Garde tes meilleures paires en rotation.`, "#f39c12");
            } else if (totalLinks >= 50) {
                commentsHTML += createAnalysisBlock("A", "Synergie Correcte", `<b>${totalLinks} liens partagés.</b> C'est ok, mais il faudra parfois faire attention aux sphères de Ki pour partir en Spé.`, "#3498db");
            } else {
                commentsHTML += createAnalysisBlock("B", "Problème de Moteur", `Seulement <b>${totalLinks} liens partagés.</b> Tes personnages ne se parlent pas. Prépare des objets de soutien pour le Ki.`, "#888");
            }

            if (tankCount >= 4) {
                commentsHTML += createAnalysisBlock("Z", "Le Mur de l'Infini", `<b>${tankCount} Tanks/Esquiveurs !</b> Tu pourrais encaisser une Spéciale de Gogeta Blue Red Zone en souriant. Increvable.`, "#e74c3c");
            } else if (tankCount >= 2) {
                commentsHTML += createAnalysisBlock("S", "Défense Équilibrée", `<b>${tankCount} personnages défensifs.</b> Place-les intelligemment en Slot 1 pour encaisser les coups, et laisse tes DPS faire le reste.`, "#f39c12");
            } else if (tankCount === 1) {
                commentsHTML += createAnalysisBlock("A", "Défense Critique", `<b>Un seul Tank !</b> Il va falloir le prier pour qu'il soit dans la bonne rotation quand le Boss s'énervera.`, "#e67e22");
            } else {
                commentsHTML += createAnalysisBlock("C", "Kamikaze", `<b>0 Tank.</b> C'est une stratégie "Tuer ou être tué". Un item Whis (réduction de dégâts) est obligatoire !`, "#888");
            }

            if (supportCount >= 3) {
                commentsHTML += createAnalysisBlock("Z", "Soutien Massif", `<b>${supportCount} Supports !</b> Les statistiques de tes attaquants principaux vont atteindre des valeurs astronomiques !`, "#e74c3c");
            } else if (supportCount >= 1) {
                commentsHTML += createAnalysisBlock("A", "Bonne Huile de Coude", `<b>${supportCount} Support(s).</b> Utile pour gonfler la défense des autres et sécuriser le Ki en 3ème position.`, "#2ecc71");
            }

            document.getElementById('analyzer-content').innerHTML = commentsHTML;
            document.getElementById('analyzer-modal').style.display = 'flex';
        };

        function createAnalysisBlock(note, titre, texte, couleur) {
            return `
                <div style="display:flex; align-items:flex-start; gap:20px; background:rgba(255,255,255,0.03); padding:20px; border-radius:12px; border-left:5px solid ${couleur};">
                    <div style="background:${couleur}; color:#fff; font-family:'Bangers', cursive; font-size:1.8rem; width:45px; height:45px; display:flex; align-items:center; justify-content:center; border-radius:8px; flex-shrink:0; text-shadow:2px 2px 0 #000;">
                        ${note}
                    </div>
                    <div>
                        <h3 style="margin:0 0 8px 0; color:${couleur}; font-family:'Bangers', cursive; font-size:1.5rem; letter-spacing:1px;">${titre}</h3>
                        <p style="margin:0; color:#ddd; line-height:1.6;">${texte}</p>
                    </div>
                </div>
            `;
        }
        renderTeams();
    </script>
</body>
</html>
