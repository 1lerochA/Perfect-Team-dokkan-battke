<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de Tier List - Dokkan Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .tier-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 15px;
            border: 2px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .tier-row {
            display: flex;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            min-height: 120px;
            background: rgba(0,0,0,0.3);
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: #000;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.3);
            border-right: 2px solid rgba(255,255,255,0.1);
        }

        /* Couleurs officielles des Tiers */
        .tier-z { background: #ff7f7f; }
        .tier-s { background: #ffbf7f; }
        .tier-a { background: #ffff7f; }
        .tier-b { background: #7fff7f; }
        .tier-c { background: #7fbfff; }

        .tier-content {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            align-items: center;
            transition: background 0.3s;
        }

        .tier-content.drag-over {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2);
        }

        .character-pool-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--glass-border);
        }

        .character-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 200px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            align-items: flex-start;
        }

        .draggable-card {
            cursor: grab;
            transition: transform 0.2s;
            animation: fadeIn 0.3s ease-out;
        }

        .draggable-card:active {
            cursor: grabbing;
            transform: scale(1.1);
            z-index: 100;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-reset {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-reset:hover {
            transform: translateY(-3px);
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align:center; margin-bottom: 40px;">
            <h1 class="dokkan-font" style="font-size:4rem; margin-bottom:0; color:var(--accent-gold); text-shadow: 4px 4px 0 #000;">DOKKAN TIER LIST</h1>
            <div style="width:100px; height:4px; background:var(--accent-gold); margin: 15px auto; border-radius:2px;"></div>
            <p style="color:#aaa; font-size:1.1rem;">Glissez et déposez vos personnages pour établir le classement ultime.</p>
        </header>

        <div class="controls">
            <button class="btn-reset" onclick="resetTierList()">🗑️ RÉINITIALISER LA TIER LIST</button>
        </div>

        <div class="tier-container">
            <div class="tier-row">
                <div class="tier-label tier-z">Z</div>
                <div class="tier-content drop-zone" id="tier-z"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-s">S</div>
                <div class="tier-content drop-zone" id="tier-s"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-a">A</div>
                <div class="tier-content drop-zone" id="tier-a"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-b">B</div>
                <div class="tier-content drop-zone" id="tier-b"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-c">C</div>
                <div class="tier-content drop-zone" id="tier-c"></div>
            </div>
        </div>

        <div class="character-pool-container">
            <h3 style="color:var(--accent-blue); font-family:'Bangers', cursive; font-size:1.8rem; margin-top:0;">👇 VOTRE BOX (Glissez vers le haut)</h3>
            <div class="character-pool drop-zone" id="pool"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="nav.js"></script>
    <script src="cards.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCharactersToPool();
            setupDragAndDrop();
        });

        function loadCharactersToPool() {
            const poolEl = document.getElementById('pool');
            poolEl.innerHTML = ''; 

            let boxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];
            let charactersToShow = [];

            if (boxIds.length > 0) {
                charactersToShow = dokkanCharacters.filter(c => boxIds.includes(c.id));
            } else {
                charactersToShow = dokkanCharacters.slice(0, 50); 
            }

            charactersToShow.sort((a, b) => {
                let scoreA = a.rarity === 'LR' ? 10 : (a.rarity === 'UR' ? 5 : 0);
                let scoreB = b.rarity === 'LR' ? 10 : (b.rarity === 'UR' ? 5 : 0);
                if (scoreA === scoreB) return b.id - a.id;
                return scoreB - scoreA;
            });

            charactersToShow.forEach(char => {
                const wrapper = document.createElement('div');
                wrapper.className = 'draggable-card';
                wrapper.draggable = true;
                wrapper.id = 'drag-' + char.id; 
                wrapper.innerHTML = createDokkanCard(char, { size: 'md', isInBox: false });
                
                poolEl.appendChild(wrapper);
            });
        }

        function setupDragAndDrop() {
            const draggables = document.querySelectorAll('.draggable-card');
            const dropZones = document.querySelectorAll('.drop-zone');

            draggables.forEach(draggable => {
                draggable.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', draggable.id);
                    setTimeout(() => { draggable.style.opacity = '0.5'; }, 0);
                });

                draggable.addEventListener('dragend', () => {
                    draggable.style.opacity = '1';
                });
            });

            dropZones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    
                    const draggedId = e.dataTransfer.getData('text/plain');
                    const draggedElement = document.getElementById(draggedId);
                    
                    if (draggedElement) {
                        zone.appendChild(draggedElement);
                    }
                });
            });
        }

        window.resetTierList = function() {
            const poolEl = document.getElementById('pool');
            const allCards = document.querySelectorAll('.draggable-card');
            
            allCards.forEach(card => {
                poolEl.appendChild(card);
            });
        };
    </script>
</body>
</html>
