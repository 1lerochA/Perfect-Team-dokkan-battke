<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encyclopédie - Dokkan Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-section {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-deep);
        }
        
        .filter-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .filter-header h3 {
            margin: 0;
            color: var(--accent-gold);
            font-size: 1.4rem;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .filter-label {
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            font-size: 0.8rem;
            min-width: 80px;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 60px 0;
            background: var(--glass-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .results-info {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            color: #aaa;
        }
        
        .results-info strong {
            color: var(--accent-gold);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 50px;">
            <h1 class="dokkan-font" style="font-size:4.5rem; color:var(--accent-gold); text-shadow:4px 4px 0 #000; margin-bottom: 0;">ENCYCLOPÉDIE</h1>
            <p style="color:#888; font-style:italic; font-size: 1.1rem;">Explore la base de données ultime des guerriers Dokkan.</p>
        </header>

        <div class="filter-section">
            <div style="margin-bottom: 30px;">
                <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Rechercher un nom, une catégorie...">
            </div>
            
            <div class="filter-row">
                <span class="filter-label">Types :</span>
                <div class="filter-group" style="margin: 0; justify-content: flex-start;">
                    <button class="btn-type active" data-type="ALL">TOUT</button>
                    <button class="btn-type filter-agi" data-type="AGI">AGI</button>
                    <button class="btn-type filter-tec" data-type="TEC">TEC</button>
                    <button class="btn-type filter-int" data-type="INT">INT</button>
                    <button class="btn-type filter-pui" data-type="PUI">PUI</button>
                    <button class="btn-type filter-end" data-type="END">END</button>
                </div>
            </div>

            <div class="filter-row" style="margin-bottom: 0;">
                <span class="filter-label">Rareté :</span>
                <div class="filter-group" style="margin: 0; justify-content: flex-start;">
                    <button class="btn-type active" data-rarity="ALL">TOUTES</button>
                    <button class="btn-type filter-lr" data-rarity="LR">LR</button>
                    <button class="btn-type filter-ur" data-rarity="UR">UR</button>
                    <button class="btn-type filter-ssr" data-rarity="SSR">SSR</button>
                </div>
            </div>
        </div>

        <style>
            /* Couleurs spécifiques aux filtres - SOLIDE & VIF */
            .btn-type {
                background: #1a1a1a;
                border: 2px solid #333;
                opacity: 0.8;
            }
            .btn-type:hover {
                opacity: 1;
                transform: translateY(-2px);
            }

            .btn-type.filter-agi { border-color: #2980b9; color: #5dade2; background: #0d2d4a; }
            .btn-type.filter-tec { border-color: #27ae60; color: #58d68d; background: #0d3d20; }
            .btn-type.filter-int { border-color: #8e44ad; color: #bb8fce; background: #3a0d5a; }
            .btn-type.filter-pui { border-color: #c0392b; color: #ec7063; background: #4a0d0d; }
            .btn-type.filter-end { border-color: #e67e22; color: #f0b27a; background: #5a2800; }

            .btn-type.filter-agi.active { background: #2980b9; color: white; border-color: #5dade2; box-shadow: 0 0 15px #2980b9; opacity: 1; }
            .btn-type.filter-tec.active { background: #27ae60; color: white; border-color: #58d68d; box-shadow: 0 0 15px #27ae60; opacity: 1; }
            .btn-type.filter-int.active { background: #8e44ad; color: white; border-color: #bb8fce; box-shadow: 0 0 15px #8e44ad; opacity: 1; }
            .btn-type.filter-pui.active { background: #c0392b; color: white; border-color: #ec7063; box-shadow: 0 0 15px #c0392b; opacity: 1; }
            .btn-type.filter-end.active { background: #e67e22; color: white; border-color: #f0b27a; box-shadow: 0 0 15px #e67e22; opacity: 1; }

            /* Couleurs Rareté - SOLIDE */
            .btn-type.filter-lr { border-color: #f1c40f; color: #f1c40f; background: #4e3a00; }
            .btn-type.filter-lr.active { background: linear-gradient(180deg, #f39c12, #f1c40f); color: black; border-color: #fff; box-shadow: 0 0 15px #f39c12; opacity: 1; }
            
            .btn-type.filter-ur { border-color: #bdc3c7; color: #ecf0f1; background: #2c3e50; }
            .btn-type.filter-ur.active { background: #ecf0f1; color: black; border-color: #fff; box-shadow: 0 0 15px #fff; opacity: 1; }

            .btn-type.filter-ssr { border-color: #b8860b; color: #f39c12; background: #3d2b00; }
            .btn-type.filter-ssr.active { background: #b8860b; color: white; border-color: #f1c40f; box-shadow: 0 0 15px #b8860b; opacity: 1; }

            .btn-type.active[data-type="ALL"], .btn-type.active[data-rarity="ALL"] {
                background: #444;
                border-color: #888;
                color: white;
                opacity: 1;
            }
        </style>

        <div class="results-info" id="results-count">
            Chargement des personnages...
        </div>

        <div id="dokkan-grid" class="dokkan-grid"></div>
        <div id="pagination-controls"></div>
    </div>

    <script src="data.js"></script>
    <script src="nav.js"></script>
    <script src="cards.js?v=999"></script>
    <script>
        let currentTypeFilter = 'ALL';
        let currentRarityFilter = 'ALL';
        let searchQuery = '';
        
        let pageActuelle = 1;
        const persosParPage = 60; 

        const myBoxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];
        const grid = document.getElementById('dokkan-grid');

        function renderCharacters() {
            if (!grid) return;
            grid.innerHTML = '';
            
            let filtered = dokkanCharacters.filter(c => {
                const matchType = currentTypeFilter === 'ALL' || c.type === currentTypeFilter;
                const matchRarity = currentRarityFilter === 'ALL' || c.rarity === currentRarityFilter;
                const matchSearch = c.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                   (c.categories && c.categories.some(cat => cat.toLowerCase().includes(searchQuery.toLowerCase())));
                return matchType && matchRarity && matchSearch;
            });

            const rarityOrder = ['LR', 'UR', 'SSR', 'SR', 'R', 'N'];
            filtered.sort((a, b) => {
                const rankA = rarityOrder.indexOf(a.rarity);
                const rankB = rarityOrder.indexOf(b.rarity);
                if (rankA !== rankB) return rankA - rankB; 
                return b.id - a.id;
            });

            const countEl = document.getElementById('results-count');
            if (countEl) {
                countEl.innerHTML = `<strong>${filtered.length}</strong> guerrier(s) trouvé(s)`;
            }

            const totalDesPages = Math.ceil(filtered.length / persosParPage) || 1;
            if (pageActuelle > totalDesPages) pageActuelle = totalDesPages;

            const startIndex = (pageActuelle - 1) * persosParPage;
            const toDisplay = filtered.slice(startIndex, startIndex + persosParPage);

            toDisplay.forEach((char, index) => {
                const tmp = document.createElement('div');
                tmp.innerHTML = createDokkanCard(char, { size: 'md', isInBox: myBoxIds.includes(char.id) });
                const cardEl = tmp.firstElementChild;
                
                cardEl.style.cursor = 'pointer';
                cardEl.style.animation = `fadeIn 0.4s ease-out ${index * 0.02}s both`;
                cardEl.onclick = () => window.handleUnitClick(char.id);
                
                grid.appendChild(cardEl);
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding: 50px;"><p style="color:#666; font-size: 1.2rem;">Aucun personnage ne correspond à tes critères.</p></div>';
            }

            renderPagination(totalDesPages);
        }

        function renderPagination(totalDesPages) {
            const paginationDiv = document.getElementById('pagination-controls');
            paginationDiv.innerHTML = '';
            
            if (totalDesPages <= 1) return;

            const container = document.createElement('div');
            container.className = 'pagination-container';
            
            // Previous
            const btnPrev = document.createElement('button');
            btnPrev.className = 'btn-page nav-btn';
            btnPrev.innerHTML = '←';
            btnPrev.disabled = pageActuelle === 1;
            btnPrev.onclick = () => changePage(pageActuelle - 1);
            container.appendChild(btnPrev);

            // Page numbers
            let startPage = Math.max(1, pageActuelle - 2);
            let endPage = Math.min(totalDesPages, startPage + 4);
            
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            if (startPage > 1) {
                const btnFirst = document.createElement('button');
                btnFirst.className = 'btn-page';
                btnFirst.textContent = '1';
                btnFirst.onclick = () => changePage(1);
                container.appendChild(btnFirst);
                
                if (startPage > 2) {
                    const dots = document.createElement('span');
                    dots.textContent = '...';
                    dots.style.color = '#555';
                    dots.style.margin = '0 5px';
                    container.appendChild(dots);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `btn-page ${i === pageActuelle ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => changePage(i);
                container.appendChild(btn);
            }

            if (endPage < totalDesPages) {
                if (endPage < totalDesPages - 1) {
                    const dots = document.createElement('span');
                    dots.textContent = '...';
                    dots.style.color = '#555';
                    dots.style.margin = '0 5px';
                    container.appendChild(dots);
                }
                
                const btnLast = document.createElement('button');
                btnLast.className = 'btn-page';
                btnLast.textContent = totalDesPages;
                btnLast.onclick = () => changePage(totalDesPages);
                container.appendChild(btnLast);
            }

            // Next
            const btnNext = document.createElement('button');
            btnNext.className = 'btn-page nav-btn';
            btnNext.innerHTML = '→';
            btnNext.disabled = pageActuelle === totalDesPages;
            btnNext.onclick = () => changePage(pageActuelle + 1);
            container.appendChild(btnNext);

            paginationDiv.appendChild(container);
        }

        window.changePage = function(newPage) {
            pageActuelle = newPage;
            renderCharacters();
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        };

        document.getElementById('searchInput').addEventListener('input', e => {
            searchQuery = e.target.value;
            pageActuelle = 1;
            renderCharacters();
        });

        document.querySelectorAll('[data-type]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTypeFilter = btn.dataset.type;
                pageActuelle = 1; 
                renderCharacters();
            });
        });

        document.querySelectorAll('[data-rarity]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-rarity]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRarityFilter = btn.dataset.rarity;
                pageActuelle = 1; 
                renderCharacters();
            });
        });

        renderCharacters();
    </script>
</body>
</html>
