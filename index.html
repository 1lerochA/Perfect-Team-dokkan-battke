<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Équipe - Dokkan Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .selected-leader-display {
            display: none;
            align-items: center;
            gap: 24px;
            background: rgba(0,0,0,0.45);
            padding: 22px 26px;
            border-radius: 15px;
            border: 1px solid var(--accent-gold);
            box-sizing: border-box;
        }

        /* Espace suffisant pour la carte + débordement des badges (8px de chaque côté) */
        #leader-card-placeholder {
            width: 106px;
            height: 106px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-sizing: border-box;
        }

        .leader-info h2 { margin: 0; color: var(--accent-gold); font-family: 'Bangers', cursive; font-size: 2rem; letter-spacing: 2px; }
        .leader-info p  { margin: 6px 0 0 0; font-size: 0.85rem; color: #ccc; font-style: italic; line-height: 1.5; }

        .suggestions-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #13181f;
            border-radius: 12px;
            max-height: 340px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: 0 12px 40px rgba(0,0,0,0.9);
            border: 1px solid #2a2a2a;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 18px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #1c1c1c;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #1e242d; }

        /* Wrapper pour miniature dans suggestion : padding pour les badges débordants */
        .suggestion-thumb {
            width: 66px;
            height: 66px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-sizing: border-box;
        }

        .suggestion-info .s-name { font-weight: 900; color: var(--accent-gold); font-size: 1rem; }
        .suggestion-info .s-meta { font-size: 0.78rem; color: #777; margin-top: 3px; }

        .btn-action {
            padding: 14px 28px;
            font-size: 1.2rem;
            font-family: 'Bangers', cursive;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.25s;
            text-transform: uppercase;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.35);
            letter-spacing: 1px;
        }
        .btn-generate-box { background: linear-gradient(135deg, #e67e22, #d35400); }
        .btn-generate-all { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-reset        { background: #3a3a3a; font-size: 0.9rem; padding: 9px 18px; }
        .btn-like         { background: linear-gradient(135deg, #e74c3c, #c0392b); font-size: 1rem; padding: 12px 24px; }

        .btn-action:hover    { transform: translateY(-3px); box-shadow: 0 7px 22px rgba(0,0,0,0.55); }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

        .team-result { margin-top: 40px; }

        .member-row {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 14px 18px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-blue);
            transition: 0.25s;
            margin-bottom: 12px;
        }
        .member-row:hover { background: rgba(255,255,255,0.07); transform: translateX(8px); }

        /* Wrapper carte membre : espace pour badges débordants */
        .member-card-wrap {
            width: 106px;
            height: 106px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-sizing: border-box;
        }

        .member-details { margin-left: 16px; flex-grow: 1; text-align: left; }
        .member-details h3 { margin: 0; color: var(--accent-blue); font-family: 'Bangers', cursive; font-size: 1.4rem; }

        .synergy-pills { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .pill {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(52,152,219,0.18);
            border: 1px solid var(--accent-blue);
            font-weight: bold;
        }
        .pill.score { background: rgba(46,204,113,0.18); border-color: #2ecc71; color: #2ecc71; }

        .team-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">🔮 Générateur</a>
        <a href="box.html">🎒 Ma Box</a>
        <a href="teams.html">⭐ Mes Équipes</a>
    </nav>

    <div class="container">
        <h1 class="dokkan-font" style="font-size:4rem;color:var(--accent-gold);text-shadow:4px 4px 0 #000;margin-bottom:10px;">
            DOKKAN TEAM BUILDER
        </h1>
        <p style="font-style:italic;color:#aaa;margin-bottom:40px;">
            Crée l'équipe parfaite basée sur tes liens et ton alignement.
        </p>

        <div class="controls" style="position:relative;">

            <div id="search-section">
                <h3 class="dokkan-font" style="text-align:left;margin-bottom:10px;font-size:1.4rem;">
                    1. CHOISIS TON LEADER
                </h3>
                <input type="text" id="leaderInput" class="search-bar"
                       placeholder="🔍 Tape le nom de ton leader...">
                <div id="suggestions" class="suggestions-list" style="display:none;"></div>
            </div>

            <div id="selected-leader-container" class="selected-leader-display">
                <div id="leader-card-placeholder"></div>
                <div class="leader-info">
                    <h2 id="display-leader-name"></h2>
                    <p  id="display-leader-skill"></p>
                    <button class="btn-reset btn-action" style="margin-top:12px;"
                            onclick="resetLeader()">Changer de leader</button>
                </div>
            </div>

            <div id="action-section"
                 style="margin-top:28px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
                <button id="btn-box" class="btn-action btn-generate-box"
                        disabled onclick="generateTeam(false)">
                    ⚔️ Générer avec MA BOX
                </button>
                <button id="btn-all" class="btn-action btn-generate-all"
                        disabled onclick="generateTeam(true)">
                    🌍 Générer avec TOUT LE JEU
                </button>
            </div>
        </div>

        <div id="team-results" class="team-result"></div>
    </div>

    <script src="data.js"></script>
    <script src="cards.js?v=999"></script>
    <script>
        let selectedLeader    = null;
        let generatedTeams    = [];

        const leaderInput    = document.getElementById('leaderInput');
        const suggestionsDiv = document.getElementById('suggestions');
        const actionButtons  = [
            document.getElementById('btn-box'),
            document.getElementById('btn-all')
        ];

        leaderInput.addEventListener('input', e => {
            const q = e.target.value.toLowerCase().trim();
            if (q.length < 2) { suggestionsDiv.style.display = 'none'; return; }

            const matches = dokkanCharacters
                .filter(c => c.name.toLowerCase().includes(q))
                .slice(0, 10);

            if (!matches.length) { suggestionsDiv.style.display = 'none'; return; }

            suggestionsDiv.innerHTML = matches.map(c => `
                <div class="suggestion-item" onclick="selectLeader(${c.id})">
                    <div class="suggestion-thumb">
                        ${createDokkanCard(c, { size: 'sm' })}
                    </div>
                    <div class="suggestion-info">
                        <div class="s-name">${c.name}</div>
                        <div class="s-meta">${c.rarity} · ${c.type} · ${c.alignment || ''}</div>
                    </div>
                </div>
            `).join('');
            suggestionsDiv.style.display = 'block';
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-section')) suggestionsDiv.style.display = 'none';
        });

        window.selectLeader = function(id) {
            selectedLeader = dokkanCharacters.find(c => c.id === id);
            if (!selectedLeader) return;

            document.getElementById('leader-card-placeholder').innerHTML =
                createDokkanCard(selectedLeader, { size: 'md' });

            document.getElementById('display-leader-name').textContent = selectedLeader.name;
            document.getElementById('display-leader-skill').textContent =
                'Leader Skill : ' + (selectedLeader.leaderSkill || 'Non disponible');

            document.getElementById('search-section').style.display          = 'none';
            document.getElementById('selected-leader-container').style.display = 'flex';
            suggestionsDiv.style.display = 'none';
            actionButtons.forEach(btn => btn.disabled = false);
        };

        window.resetLeader = function() {
            selectedLeader = null; generatedTeams = [];
            leaderInput.value = '';
            document.getElementById('search-section').style.display            = 'block';
            document.getElementById('selected-leader-container').style.display = 'none';
            document.getElementById('team-results').innerHTML = '';
            actionButtons.forEach(btn => btn.disabled = true);
        };


        window.generateTeam = function(useFullGame) {
            const resultsDiv = document.getElementById('team-results');
            resultsDiv.innerHTML = '<h2 class="dokkan-font" style="color:#f39c12;text-align:center;margin-top:40px;">⚡ CALCUL DES ÉQUIPES EN COURS… ⚡</h2>';

            const poolIds = useFullGame
                ? dokkanCharacters.map(c => c.id)
                : (JSON.parse(localStorage.getItem('dokkanBox')) || []);

            if (!useFullGame && !poolIds.length) {
                resultsDiv.innerHTML = '<p style="color:#e74c3c;font-size:1.1rem;text-align:center;">Ta box est vide ! Va dans "Ma Box" pour ajouter des personnages.</p>';
                return;
            }

            const catRegex = /"([^"]+)"/g;
            const categoriesFound = [];
            let match;
            while ((match = catRegex.exec(selectedLeader.leaderSkill)) !== null) {
                if (!categoriesFound.includes(match[1])) categoriesFound.push(match[1]);
            }

            const friendLeader = selectedLeader;
            generatedTeams = [];

            const teamConfigs = [];
            
            if (categoriesFound.length === 0) {
                for(let i=0; i<5; i++) teamConfigs.push({ type: 'MIX', name: "TEAM " + selectedLeader.name.toUpperCase() });
            
            } else if (categoriesFound.length === 1) {
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[0], name: "TEAM " + categoriesFound[0].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[0], name: "TEAM " + categoriesFound[0].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[0], name: "TEAM " + categoriesFound[0].toUpperCase() });
                teamConfigs.push({ type: 'MIX', name: "TEAM ALTERNATIVE" });
                teamConfigs.push({ type: 'MIX', name: "TEAM FULL LIENS" });
            
            } else if (categoriesFound.length === 2) {
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[0], name: "TEAM " + categoriesFound[0].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[0], name: "TEAM " + categoriesFound[0].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[1], name: "TEAM " + categoriesFound[1].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[1], name: "TEAM " + categoriesFound[1].toUpperCase() });
                teamConfigs.push({ type: 'MIX', name: "TEAM HYBRIDE (MIX)" });
            
            } else {
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[0], name: "TEAM " + categoriesFound[0].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[1], name: "TEAM " + categoriesFound[1].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[2], name: "TEAM " + categoriesFound[2].toUpperCase() });
                teamConfigs.push({ type: 'CAT', cat: categoriesFound[categoriesFound.length > 3 ? 3 : 0], name: "TEAM " + categoriesFound[categoriesFound.length > 3 ? 3 : 0].toUpperCase() });
                teamConfigs.push({ type: 'MIX', name: "TEAM HYBRIDE (MIX)" });
            }

            for (let i = 0; i < 5; i++) {
                const config = teamConfigs[i];

                let teamCandidates = dokkanCharacters
                    .filter(c => poolIds.includes(c.id) && c.id !== selectedLeader.id)
                    .map(char => {
                        let score = 0;
                        const sharedLinks = (char.links || []).filter(l => (selectedLeader.links || []).includes(l));
                        score += sharedLinks.length * 20;

                        if (char.alignment === selectedLeader.alignment) score += 30;
                        if (char.type === selectedLeader.type) score += 10;
                        
                        if (config.type === 'CAT') {
                            if (char.name.toLowerCase().includes(config.cat.toLowerCase())) score += 80;
                            if (char.leaderSkill && char.leaderSkill.includes(config.cat)) score += 60;
                            
                            categoriesFound.forEach(c => {
                                if(c !== config.cat) {
                                   if (char.name.toLowerCase().includes(c.toLowerCase())) score += 15;
                                   if (char.leaderSkill && char.leaderSkill.includes(c)) score += 10;
                                }
                            });
                        } else {
                            categoriesFound.forEach(c => {
                                if (char.name.toLowerCase().includes(c.toLowerCase())) score += 35;
                                if (char.leaderSkill && char.leaderSkill.includes(c)) score += 25;
                            });
                            score += sharedLinks.length * 15; 
                        }

                        const rngBonus = (i === 1 || i === 3 || config.type === 'MIX') ? Math.random() * 90 : Math.random() * 20;

                        return { ...char, finalScore: score + rngBonus, sharedLinksWithLeader: sharedLinks.length };
                    });

                teamCandidates.sort((a, b) => b.finalScore - a.finalScore);

                const members = [];
                const usedIds = new Set([selectedLeader.id]);

                for (let c of teamCandidates) {
                    if (members.length < 5 && !usedIds.has(c.id)) {
                        members.push(c);
                        usedIds.add(c.id);
                    }
                }

                generatedTeams.push({
                    id: Date.now() + i,
                    teamName: config.name, 
                    leader: selectedLeader,
                    friend: friendLeader,
                    members: members,
                    source: useFullGame ? 'Tout le jeu' : 'Ma Box',
                    date: new Date().toLocaleDateString('fr-FR')
                });
            }

            renderGeneratedTeams();
        };

        window.toggleDetails = function(teamId) {
            const detailsDiv = document.getElementById('details-' + teamId);
            if (detailsDiv.style.display === 'none') {
                detailsDiv.style.display = 'block';
            } else {
                detailsDiv.style.display = 'none';
            }
        };

        function renderGeneratedTeams() {
            const resultsDiv = document.getElementById('team-results');
            resultsDiv.innerHTML = '';

            generatedTeams.forEach((team, tIndex) => {
                const teamSection = document.createElement('div');
                teamSection.className = 'team-result';
                teamSection.style.marginBottom = '60px';
                teamSection.style.padding = '20px';
                teamSection.style.background = 'rgba(255,255,255,0.02)';
                teamSection.style.borderRadius = '20px';
                teamSection.style.border = '1px solid rgba(255,255,255,0.05)';

                const headerBar = document.createElement('div');
                headerBar.className = 'team-header-bar';
                headerBar.innerHTML = `
                    <h2 class="dokkan-font" style="color:var(--accent-gold);margin:0;font-size:2rem;">
                        ${team.teamName} <span style="font-size:1.2rem;color:#888;">(Option #${tIndex + 1})</span>
                    </h2>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-action btn-reset" onclick="toggleDetails(${team.id})">👁️ Détails</button>
                        <button class="btn-action btn-like" onclick="likeTeam(${tIndex})">❤️ SAUVEGARDER</button>
                    </div>`;
                teamSection.appendChild(headerBar);

                const unitsRow = document.createElement('div');
                unitsRow.style.display = 'flex';
                unitsRow.style.gap = '10px';
                unitsRow.style.flexWrap = 'wrap';
                unitsRow.style.justifyContent = 'center';

                const myBoxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];

                unitsRow.innerHTML += `
                    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
                        ${createDokkanCard(team.leader, { isInBox: myBoxIds.includes(team.leader.id) })}
                        <span style="font-size:0.7rem;color:var(--accent-gold);font-weight:900;">LEADER</span>
                    </div>`;

                team.members.forEach(m => {
                    unitsRow.innerHTML += `
                        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
                            ${createDokkanCard(m, { isInBox: myBoxIds.includes(m.id) })}
                            <span style="font-size:0.7rem;color:#aaa;">MEMBRE</span>
                        </div>`;
                });

                unitsRow.innerHTML += `
                    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
                        ${createDokkanCard(team.friend, { isFriend: true, isInBox: myBoxIds.includes(team.friend.id) })}
                        <span style="font-size:0.7rem;color:var(--accent-blue);font-weight:900;">AMI</span>
                    </div>`;

                teamSection.appendChild(unitsRow);

                const detailsList = document.createElement('div');
                detailsList.id = 'details-' + team.id; 
                detailsList.style.display = 'none';
                detailsList.style.marginTop = '20px';
                detailsList.style.borderTop = '1px solid rgba(255,255,255,0.1)';
                detailsList.style.paddingTop = '15px';

                team.members.forEach(m => {
                    const row = document.createElement('div');
                    row.className = 'member-row';
                    row.style.padding = '8px 15px';
                    row.style.marginBottom = '8px';

                    const wrap = document.createElement('div');
                    wrap.className = 'member-card-wrap';
                    wrap.style.width = '70px';
                    wrap.style.height = '70px';
                    wrap.innerHTML = createDokkanCard(m, { size: 'sm', isInBox: myBoxIds.includes(m.id) });
                    row.appendChild(wrap);

                    const details = document.createElement('div');
                    details.className = 'member-details';
                    details.style.marginLeft = '12px';
                    details.innerHTML = `
                        <h3 style="font-size:1.1rem;margin:0;">${m.name}</h3>
                        <div class="synergy-pills">
                            <span class="pill">🔗 ${m.sharedLinksWithLeader} Liens avec Leader</span>
                            <span class="pill score">Score de Synergie : ${Math.floor(m.finalScore)} pts</span>
                        </div>`;
                    row.appendChild(details);
                    detailsList.appendChild(row);
                });                
                teamSection.appendChild(detailsList);
                resultsDiv.appendChild(teamSection);
            });
        };

        window.likeTeam = function(index) {
            const lastGeneratedTeam = generatedTeams[index];
            if (!lastGeneratedTeam) return;

            const teams = JSON.parse(localStorage.getItem('dokkanSavedTeams')) || [];
            const allMembers = lastGeneratedTeam.members.map(m => m.id);
            
            if (lastGeneratedTeam.friend) {
                allMembers.push(lastGeneratedTeam.friend.id);
            }

            teams.push({
                id       : Date.now(),
                name     : lastGeneratedTeam.teamName || ('Équipe de ' + lastGeneratedTeam.leader.name),
                leaderId : lastGeneratedTeam.leader.id,
                memberIds: allMembers,
                source   : lastGeneratedTeam.source,
                date     : lastGeneratedTeam.date
            });
            localStorage.setItem('dokkanSavedTeams', JSON.stringify(teams));

            const btns = document.querySelectorAll('.btn-like');
            const btn = btns[index];
            if (btn) {
                btn.textContent = '✅ SAUVEGARDÉE !';
                btn.style.background = 'linear-gradient(135deg,#27ae60,#145c33)';
                btn.disabled = true;
                setTimeout(() => {
                    btn.textContent = "❤️ SAUVEGARDER";
                    btn.style.background = '';
                    btn.disabled = false;
                }, 2500);
            }
        };

        window.handleUnitClick = function() {};
    </script>
</body>
</html>
