<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Équipe - Dokkan Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(243, 156, 18, 0.3);
        }

        .selected-leader-display {
            display: none;
            align-items: center;
            gap: 30px;
            background: linear-gradient(135deg, rgba(20, 30, 48, 0.7), rgba(36, 59, 85, 0.7));
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.15);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #leader-card-placeholder {
            width: 110px;
            height: 110px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .leader-info h2 { 
            margin: 0; 
            color: var(--accent-gold); 
            font-family: 'Bangers', cursive; 
            font-size: 2.2rem; 
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #000;
        }
        
        .leader-info p { 
            margin: 8px 0 0 0; 
            font-size: 0.95rem; 
            color: #eee; 
            line-height: 1.4;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 10px;
            border-left: 3px solid var(--accent-gold);
        }

        .suggestions-list {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 2000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .suggestion-item:hover { 
            background: rgba(255,255,255,0.08); 
            transform: translateX(10px);
        }

        .suggestion-thumb {
            width: 70px;
            height: 70px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .suggestion-info .s-name { font-weight: 900; color: var(--accent-gold); font-size: 1.1rem; }
        .suggestion-info .s-meta { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }

        .btn-action {
            padding: 18px 35px;
            font-size: 1.3rem;
            font-family: 'Bangers', cursive;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .btn-generate-box { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-generate-all { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
        .btn-reset { 
            background: #4a0d0d; 
            color: #ffbaba;
            border: 2px solid #e74c3c;
            border-radius: 12px;
            font-size: 0.95rem; 
            padding: 12px 24px; 
            margin-top: 20px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        
        .btn-reset:hover { 
            background: #e74c3c; 
            color: white;
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
            transform: translateY(-2px);
        }

        .btn-action:hover:not(:disabled) { 
            transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
        }
        
        .btn-action:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .member-row {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, rgba(52, 152, 219, 0.1), transparent);
            padding: 20px;
            border-radius: 15px;
            border-left: 6px solid var(--accent-blue);
            transition: all 0.3s;
            margin-bottom: 15px;
            backdrop-filter: blur(5px);
        }
        
        .member-row:hover { 
            background: linear-gradient(90deg, rgba(52, 152, 219, 0.2), rgba(255,255,255,0.05)); 
            transform: translateX(15px); 
        }

        .synergy-pills { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .pill {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 50px;
            background: rgba(52,152,219,0.1);
            border: 1px solid rgba(52,152,219,0.3);
            font-weight: 700;
            color: #3498db;
        }
        
        .pill.score { 
            background: rgba(46,204,113,0.1); 
            border-color: rgba(46,204,113,0.3); 
            color: #2ecc71; 
        }

        .step-badge {
            background: var(--accent-gold);
            color: black;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align:center; margin-bottom: 60px;">
            <h1 class="dokkan-font" style="font-size:4.5rem; margin-bottom:0; color:var(--accent-gold); text-shadow: 4px 4px 0 #000, 0 0 30px var(--accent-glow);">DOKKAN BUILDER</h1>
            <div style="width:120px; height:4px; background:var(--accent-gold); margin: 20px auto; border-radius:2px;"></div>
            <p style="color:#aaa; font-size:1.2rem; max-width:700px; margin: 0 auto;">L'outil ultime pour forger des alliances légendaires et dominer tous les événements.</p>
        </header>

        <div class="filter-section" style="position:relative;">
            <div id="search-section">
                <h3 class="dokkan-font" style="text-align:left; margin-bottom:20px; font-size:1.8rem; display:flex; align-items:center;">
                    <span class="step-badge">1</span> CHOISISSEZ UN PERSONNAGE CENTRAL
                </h3>
                <div class="search-container" style="position:relative;">
                    <span style="position:absolute; left:25px; top:50%; transform:translateY(-50%); color:#888;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </span>
                    <input type="text" id="leaderInput" class="search-bar" placeholder="Tapez le nom d'un guerrier (ex: Gogeta, Beast Gohan...)" style="padding-left: 65px; height: 70px; border-radius: 20px; font-size: 1.2rem;">
                </div>
                <div id="suggestions" class="suggestions-list" style="display:none;"></div>
            </div>

            <div id="selected-leader-container" class="selected-leader-display">
                <div id="leader-card-placeholder"></div>
                <div class="leader-info" style="flex:1;">
                    <h2 id="display-leader-name"></h2>
                    <p id="display-leader-skill"></p>
                    <button class="btn-reset" onclick="resetLeader()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 5px;"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        CHANGER DE LEADER
                    </button>
                </div>
            </div>

            <div id="action-section" style="margin-top:40px; display:flex; gap:20px; justify-content:center; flex-wrap:wrap;">
                <button id="btn-box" class="btn-action btn-generate-box" disabled onclick="generateTeam(false)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3"></path><path d="M21 16v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3"></path><path d="M4 12H2"></path><path d="M10 12H8"></path><path d="M16 12h-2"></path><path d="M22 12h-2"></path></svg>
                    GÉNÉRER VIA MA BOX
                </button>
                <button id="btn-all" class="btn-action btn-generate-all" disabled onclick="generateTeam(true)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    GÉNÉRER VIA TOUT LE JEU
                </button>
            </div>

            <div id="category-selector-container" style="display:none; text-align:center; margin-top:25px; animation: slideUp 0.5s ease-out;">
                <label for="category-filter" style="color:var(--accent-gold); font-family:'Bangers', cursive; font-size:1.5rem; margin-right:15px; letter-spacing:1px; text-shadow:2px 2px 0 #000;">🎯 FOCUS CATÉGORIE :</label>
                <select id="category-filter" style="padding:12px 20px; font-size:1.1rem; border-radius:12px; background:rgba(15, 23, 42, 0.9); color:#fff; border:2px solid var(--accent-blue); outline:none; cursor:pointer; font-family:'Nunito', sans-serif; font-weight:700; box-shadow: 0 4px 15px rgba(0,0,0,0.4); min-width: 300px;">
                    </select>
            </div>

            <div id="build-mode-container" style="display:none; text-align:center; margin-top:15px; animation: slideUp 0.5s ease-out;">
                <label for="build-mode-filter" style="color:var(--accent-blue); font-family:'Bangers', cursive; font-size:1.5rem; margin-right:15px; letter-spacing:1px; text-shadow:2px 2px 0 #000;">⚙️ RÔLE DU PERSONNAGE :</label>
                <select id="build-mode-filter" style="padding:12px 20px; font-size:1.1rem; border-radius:12px; background:rgba(15, 23, 42, 0.9); color:#fff; border:2px solid var(--accent-blue); outline:none; cursor:pointer; font-family:'Nunito', sans-serif; font-weight:700; box-shadow: 0 4px 15px rgba(0,0,0,0.4); min-width: 300px;">
                    <option value="LEADER">👑 Créer les équipes autour de son Leader Skill</option>
                    <option value="MEMBER">🤝 Lui trouver les meilleurs Leaders (Générateur Inversé)</option>
                </select>
            </div>
        </div>

        <div id="team-results" class="team-result"></div>
    </div>

    <script src="data.js"></script>
    <script src="nav.js"></script>
    <script src="cards.js?v=999"></script>
    <script>
        let selectedLeader    = null;
        let generatedTeams    = [];
        let lastUsedMode      = false;

        const leaderInput    = document.getElementById('leaderInput');
        const suggestionsDiv = document.getElementById('suggestions');
        const actionButtons  = [
            document.getElementById('btn-box'),
            document.getElementById('btn-all')
        ];

        // Écouteur sur les menus déroulants pour régénérer automatiquement
        document.getElementById('category-filter').addEventListener('change', () => {
            if (generatedTeams.length > 0) generateTeam(lastUsedMode);
        });
        document.getElementById('build-mode-filter').addEventListener('change', (e) => {
            const catContainer = document.getElementById('category-selector-container');
            if (e.target.value === 'MEMBER') {
                catContainer.style.display = 'none'; // On cache les catégories si on cherche un Leader
            } else {
                catContainer.style.display = 'block';
            }
            if (generatedTeams.length > 0) generateTeam(lastUsedMode);
        });

        leaderInput.addEventListener('input', e => {
            const q = e.target.value.toLowerCase().trim();
            if (q.length < 2) { suggestionsDiv.style.display = 'none'; return; }
            const matches = dokkanCharacters.filter(c => c.name.toLowerCase().includes(q)).slice(0, 10);
            if (!matches.length) { suggestionsDiv.style.display = 'none'; return; }
            suggestionsDiv.innerHTML = matches.map(c => `
                <div class="suggestion-item" onclick="selectLeader(${c.id})">
                    <div class="suggestion-thumb">${createDokkanCard(c, { size: 'sm' })}</div>
                    <div class="suggestion-info">
                        <div class="s-name">${c.name}</div>
                        <div class="s-meta">${c.rarity} · ${c.type} · ${c.alignment || ''}</div>
                    </div>
                </div>
            `).join('');
            suggestionsDiv.style.display = 'block';
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-section')) suggestionsDiv.style.display = 'none';
        });

        window.selectLeader = function(id) {
            selectedLeader = dokkanCharacters.find(c => c.id === id);
            if (!selectedLeader) return;

            document.getElementById('leader-card-placeholder').innerHTML = createDokkanCard(selectedLeader, { size: 'md' });
            document.getElementById('display-leader-name').textContent = selectedLeader.name;
            document.getElementById('display-leader-skill').textContent = 'Leader Skill : ' + (selectedLeader.leaderSkill || 'Non disponible');

            document.getElementById('search-section').style.display = 'none';
            document.getElementById('selected-leader-container').style.display = 'flex';
            suggestionsDiv.style.display = 'none';
            actionButtons.forEach(btn => btn.disabled = false);

            const catFilter = document.getElementById('category-filter');
            catFilter.innerHTML = '<option value="ALL">🌟 Toutes les catégories (Génération Auto)</option>';
            
            if (selectedLeader.leaderSkill) {
                const catRegex = /"([^"]+)"/g;
                let match;
                const foundCats = [];
                while ((match = catRegex.exec(selectedLeader.leaderSkill)) !== null) {
                    if (!foundCats.includes(match[1])) {
                        foundCats.push(match[1]);
                        catFilter.innerHTML += `<option value="${match[1]}">🎯 Focus : ${match[1]}</option>`;
                    }
                }
            }
            document.getElementById('category-selector-container').style.display = 'block';
            document.getElementById('build-mode-container').style.display = 'block';
            document.getElementById('build-mode-filter').value = 'LEADER';
            
            sessionStorage.setItem('dokkanTempLeaderId', id);
        };

        window.resetLeader = function() {
            selectedLeader = null; generatedTeams = [];
            leaderInput.value = '';
            document.getElementById('search-section').style.display = 'block';
            document.getElementById('selected-leader-container').style.display = 'none';
            document.getElementById('category-selector-container').style.display = 'none';
            document.getElementById('build-mode-container').style.display = 'none';
            document.getElementById('team-results').innerHTML = '';
            actionButtons.forEach(btn => btn.disabled = true);
            
            sessionStorage.removeItem('dokkanTempLeaderId');
            sessionStorage.removeItem('dokkanTempTeams');
        };

        function getBestLeadersFor(character, poolIds) {
            let validLeaders = dokkanCharacters.filter(c => poolIds.includes(c.id) && c.id !== character.id);
            
            validLeaders = validLeaders.map(leader => {
                let score = 0;
                let givesBoost = false;

                if (leader.leaderSkill) {
                    const catRegex = /"([^"]+)" Category/g;
                    let match;
                    while ((match = catRegex.exec(leader.leaderSkill)) !== null) {
                        if (character.categories.includes(match[1])) givesBoost = true;
                    }
                    if (leader.leaderSkill.includes("Super Type") && character.alignment === "SUPER") givesBoost = true;
                    if (leader.leaderSkill.includes("Extreme Type") && character.alignment === "EXTRÊME") givesBoost = true;
                    if (leader.leaderSkill.includes("All Types")) givesBoost = true;
                    
                    const addRegex = /additional HP, ATK & DEF \+\d+% for characters who also belong to the "([^"]+)"/i;
                    const addMatch = leader.leaderSkill.match(addRegex);
                    if (addMatch && addMatch[1] && character.categories.includes(addMatch[1])) {
                        score += 2000; // Donne le fameux 200% !
                    }
                }

                if (!givesBoost) return null; // S'il ne booste pas, on l'élimine
                
                score += 5000; // Base valid leader
                if (leader.rarity === 'LR') score += 500;
                if (leader.hasSEZA) score += 300;

                let sharedLinks = 0;
                if (leader.links && character.links) {
                    sharedLinks = leader.links.filter(l => character.links.includes(l)).length;
                }
                score += sharedLinks * 150; // On valorise les leaders qui linkent bien avec lui

                return { leader, score };
            }).filter(item => item !== null);

            validLeaders.sort((a, b) => b.score - a.score);
            return validLeaders.map(item => item.leader);
        }


        window.generateTeam = function(useFullGame) {
            lastUsedMode = useFullGame; 
            const resultsDiv = document.getElementById('team-results');
            resultsDiv.innerHTML = '<div style="text-align:center; padding: 60px 0;"><div class="dokkan-font" style="font-size:2.5rem; color:var(--accent-gold); animation: pulse 1.5s infinite;">⚡ CALCUL DES ÉQUIPES EN COURS… ⚡</div></div>';

            const poolIds = useFullGame ? dokkanCharacters.map(c => c.id) : (JSON.parse(localStorage.getItem('dokkanBox')) || []);

            if (!useFullGame && !poolIds.length) {
                resultsDiv.innerHTML = '<div style="background:rgba(231,76,60,0.1); border:1px solid #e74c3c; padding:30px; border-radius:15px; text-align:center; color:#e74c3c; font-size:1.2rem;">Votre box est vide !</div>';
                return;
            }

            generatedTeams = [];
            const buildMode = document.getElementById('build-mode-filter').value;
            const selectedFocus = document.getElementById('category-filter').value;
            
            let bestLeadersForMember = [];
            if (buildMode === 'MEMBER') {
                bestLeadersForMember = getBestLeadersFor(selectedLeader, poolIds);
                if (bestLeadersForMember.length === 0) {
                    resultsDiv.innerHTML = '<div style="background:rgba(231,76,60,0.1); border:1px solid #e74c3c; padding:30px; border-radius:15px; text-align:center; color:#e74c3c; font-size:1.2rem;">Aucun Leader compatible trouvé dans votre box pour ce personnage !</div>';
                    return;
                }
            }

            const teamConfigs = [];
            if (buildMode === 'LEADER') {
                const catRegex = /"([^"]+)"/g;
                const initialCategories = [];
                let match;
                while ((match = catRegex.exec(selectedLeader.leaderSkill)) !== null) {
                    if (!initialCategories.includes(match[1])) initialCategories.push(match[1]);
                }

                if (selectedFocus !== "ALL") {
                    teamConfigs.push({ type: 'CAT', cat: selectedFocus, name: "TEAM " + selectedFocus.toUpperCase() + " (Équilibrée)" });
                    teamConfigs.push({ type: 'CAT', cat: selectedFocus, name: "TEAM " + selectedFocus.toUpperCase() + " (Offensive)" });
                    teamConfigs.push({ type: 'CAT', cat: selectedFocus, name: "TEAM " + selectedFocus.toUpperCase() + " (Défensive)" });
                    teamConfigs.push({ type: 'CAT', cat: selectedFocus, name: "TEAM " + selectedFocus.toUpperCase() + " (Alternative)" });
                    teamConfigs.push({ type: 'CAT', cat: selectedFocus, name: "TEAM " + selectedFocus.toUpperCase() + " (Full Liens)" });
                } else {
                    if (initialCategories.length === 0) {
                        for(let i=0; i<5; i++) teamConfigs.push({ type: 'MIX', name: "TEAM " + selectedLeader.name.toUpperCase() });
                    } else if (initialCategories.length === 1) {
                        for(let i=0; i<3; i++) teamConfigs.push({ type: 'CAT', cat: initialCategories[0], name: "TEAM " + initialCategories[0].toUpperCase() });
                        teamConfigs.push({ type: 'MIX', name: "TEAM ALTERNATIVE" });
                        teamConfigs.push({ type: 'MIX', name: "TEAM FULL LIENS" });
                    } else if (initialCategories.length === 2) {
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[0], name: "TEAM " + initialCategories[0].toUpperCase() });
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[0], name: "TEAM " + initialCategories[0].toUpperCase() });
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[1], name: "TEAM " + initialCategories[1].toUpperCase() });
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[1], name: "TEAM " + initialCategories[1].toUpperCase() });
                        teamConfigs.push({ type: 'MIX', name: "TEAM HYBRIDE (MIX)" });
                    } else {
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[0], name: "TEAM " + initialCategories[0].toUpperCase() });
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[1], name: "TEAM " + initialCategories[1].toUpperCase() });
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[2], name: "TEAM " + initialCategories[2].toUpperCase() });
                        teamConfigs.push({ type: 'CAT', cat: initialCategories[initialCategories.length > 3 ? 3 : 0], name: "TEAM " + initialCategories[initialCategories.length > 3 ? 3 : 0].toUpperCase() });
                        teamConfigs.push({ type: 'MIX', name: "TEAM HYBRIDE (MIX)" });
                    }
                }
            }

            let usageTracker = {};

            for (let i = 0; i < 5; i++) {
                let currentLeader = selectedLeader;
                let config = buildMode === 'LEADER' ? teamConfigs[i] : { type: 'REVERSE', name: "LEADER IDÉAL" };

                if (buildMode === 'MEMBER') {
                    if (i >= bestLeadersForMember.length) break; // S'il n'y a que 3 leaders valides, on s'arrête
                    currentLeader = bestLeadersForMember[i];
                    config.name = "LEADER : " + currentLeader.name.toUpperCase();
                }

                let currentCategoriesFound = [];
                if (currentLeader.leaderSkill) {
                    const catRegex = /"([^"]+)"/g;
                    let match;
                    while ((match = catRegex.exec(currentLeader.leaderSkill)) !== null) {
                        if (!currentCategoriesFound.includes(match[1])) currentCategoriesFound.push(match[1]);
                    }
                }

                let teamCandidates = dokkanCharacters
                    .filter(c => poolIds.includes(c.id) && c.id !== currentLeader.id)
                    .map(char => { return { ...char, finalScore: Math.random() }; });

                let members = [];
                let usedIds = new Set([currentLeader.id]); 

                // Si on cherche un Leader, on FORCE notre personnage initial dans la team !
                if (buildMode === 'MEMBER' && selectedLeader.id !== currentLeader.id) {
                    members.push(selectedLeader);
                    usedIds.add(selectedLeader.id);
                }

                while (members.length < 5 && teamCandidates.length > 0) {
                    let currentTeam = [currentLeader, ...members];
                    let hasTank = currentTeam.some(m => m.roles && m.roles.includes("TANK"));
                    let hasSupport = currentTeam.some(m => m.roles && m.roles.includes("SUPPORT"));
                    
                    let bestCandidate = null;
                    let bestScore = -99999;

                    for (let candidate of teamCandidates) {
                        if (usedIds.has(candidate.id)) continue;

                        let score = 0;
                        let isCatMatch = false;

                        if (config.type === 'CAT') {
                            isCatMatch = candidate.categories.includes(config.cat) || candidate.name.toLowerCase().includes(config.cat.toLowerCase());
                        } else if (currentLeader.leaderSkill) {
                            const catRegex = /"([^"]+)" Category/g;
                            let match;
                            let leaderCategories = [];
                            while ((match = catRegex.exec(currentLeader.leaderSkill)) !== null) {
                                leaderCategories.push(match[1]);
                            }
                            if (currentLeader.leaderSkill.includes("Super Type") && candidate.alignment === "SUPER") isCatMatch = true;
                            if (currentLeader.leaderSkill.includes("Extreme Type") && candidate.alignment === "EXTRÊME") isCatMatch = true;
                            if (currentLeader.leaderSkill.includes("All Types")) isCatMatch = true;
                            leaderCategories.forEach(cat => {
                                if (candidate.categories.includes(cat) || candidate.name.toLowerCase().includes(cat.toLowerCase())) isCatMatch = true;
                            });
                        }

                        if (isCatMatch) {
                            score += 5000;
                        } else {
                            if (buildMode === 'LEADER' && selectedFocus !== "ALL") continue; 
                            score -= 2000; 
                        }

                        if (currentLeader.leaderSkill) {
                            const additionalRegex = /additional HP, ATK & DEF \+\d+% for characters who also belong to the "([^"]+)"/i;
                            const match = currentLeader.leaderSkill.match(additionalRegex);
                            if (match && match[1] && candidate.categories.includes(match[1])) score += 1500; 
                        }

                        let sharedLinks = 0;
                        if (candidate.links) {
                            currentTeam.forEach(member => {
                                if (member.links) sharedLinks += candidate.links.filter(link => member.links.includes(link)).length;
                            });
                        }
                        score += (sharedLinks * 50);

                        let penalty = (usageTracker[candidate.id] || 0) * 30; 
                        if (i === 3 && buildMode === 'LEADER') penalty = (usageTracker[candidate.id] || 0) * 150; 
                        score -= penalty;

                        if (buildMode === 'LEADER' && selectedFocus !== "ALL") {
                            if (i === 0) {
                                if (!hasTank && candidate.roles && candidate.roles.includes("TANK")) score += 150;
                                if (!hasSupport && candidate.roles && candidate.roles.includes("SUPPORT")) score += 100;
                            } else if (i === 1) {
                                if (candidate.roles && candidate.roles.includes("DPS / NUKER")) score += 250;
                            } else if (i === 2) {
                                if (candidate.roles && candidate.roles.includes("TANK")) score += 250;
                                if (candidate.roles && candidate.roles.includes("HEALER")) score += 150;
                            } else if (i === 3) {
                                score += Math.random() * 200;
                            } else if (i === 4) {
                                score += (sharedLinks * 60);
                            }
                        } else {
                            if (!hasTank && candidate.roles && candidate.roles.includes("TANK")) score += 200; 
                            if (!hasSupport && candidate.roles && candidate.roles.includes("SUPPORT")) score += 150; 
                            if (i === 3 && buildMode === 'LEADER') score += Math.random() * 150;
                        }

                        if (score > bestScore) {
                            bestScore = score;
                            bestCandidate = candidate;
                        }
                    }

                    if (bestCandidate) {
                        members.push(bestCandidate);
                        usedIds.add(bestCandidate.id);
                    } else {
                        break; 
                    }
                }

                members.forEach(m => { usageTracker[m.id] = (usageTracker[m.id] || 0) + 1; });

                let fullTeam = [currentLeader, ...members];
                if (currentLeader) fullTeam.push(currentLeader); // Ami leader = Le leader trouvé

                let teamScore = 0;
                let finalHasTank = false;
                let finalHasSupport = false;
                let count200 = 0;
                let totalLinks = 0;

                fullTeam.forEach(m => {
                    if (m.roles && m.roles.includes("TANK")) finalHasTank = true;
                    if (m.roles && m.roles.includes("SUPPORT")) finalHasSupport = true;
                    if (currentLeader.leaderSkill) {
                        const addRegex = /additional HP, ATK & DEF \+\d+% for characters who also belong to the "([^"]+)"/i;
                        const match = currentLeader.leaderSkill.match(addRegex);
                        if (match && match[1] && m.categories.includes(match[1])) count200++;
                    }
                });

                for (let x = 0; x < fullTeam.length; x++) {
                    for (let y = x + 1; y < fullTeam.length; y++) {
                        if (fullTeam[x].links && fullTeam[y].links) {
                            totalLinks += fullTeam[x].links.filter(l => fullTeam[y].links.includes(l)).length;
                        }
                    }
                }

                teamScore = (totalLinks * 10) + (count200 * 50) + (finalHasTank ? 150 : 0) + (finalHasSupport ? 100 : 0);

                let rank = "B";
                let rankColor = "#bdc3c7"; 
                // NOUVEAU BARÈME HARDCORE
                if (teamScore >= 1550) { rank = "Z"; rankColor = "#e74c3c"; } 
                else if (teamScore >= 1200) { rank = "S"; rankColor = "#f39c12"; } 
                else if (teamScore >= 800) { rank = "A"; rankColor = "#2ecc71"; } 

                let finalTeamName = config.name; 
                if (teamScore < 500 && buildMode === 'LEADER' && selectedFocus === "ALL") finalTeamName = "TEAM ALTERNATIVE (" + currentLeader.name.toUpperCase() + ")";

                generatedTeams.push({
                    id: Date.now() + i,
                    teamName: finalTeamName,
                    rank: rank,             
                    rankColor: rankColor,  
                    score: teamScore,     
                    leader: currentLeader,
                    friend: currentLeader, // Le leader trouvé est copié en ami
                    members: members,
                    source: useFullGame ? 'Tout le jeu' : 'Ma Box',
                    date: new Date().toLocaleDateString('fr-FR')
                });
            } 

            if (buildMode === 'LEADER' && selectedFocus === "ALL") {
                generatedTeams.sort((a, b) => b.score - a.score);
            }

            renderGeneratedTeams();
            sessionStorage.setItem('dokkanTempTeams', JSON.stringify(generatedTeams));
            sessionStorage.setItem('dokkanTempLeaderId', selectedLeader ? selectedLeader.id : null);
        };

        window.toggleDetails = function(teamId) {
            const detailsDiv = document.getElementById('details-' + teamId);
            detailsDiv.style.display = detailsDiv.style.display === 'none' ? 'block' : 'none';
        };

        function renderGeneratedTeams() {
            const resultsDiv = document.getElementById('team-results');
            resultsDiv.innerHTML = '';

            generatedTeams.forEach((team, tIndex) => {
                const teamSection = document.createElement('div');
                teamSection.className = 'team-result';
                teamSection.style.marginBottom = '60px';
                teamSection.style.padding = '30px';
                teamSection.style.background = 'linear-gradient(135deg, rgba(255,255,255,0.03), transparent)';
                teamSection.style.borderRadius = '25px';
                teamSection.style.border = '1px solid rgba(255,255,255,0.08)';
                teamSection.style.boxShadow = '0 15px 40px rgba(0,0,0,0.2)';

                const headerBar = document.createElement('div');
                headerBar.className = 'team-header-bar';
                const isSaved = team.savedId != null;
                const btnText = isSaved ? '✅ SAUVEGARDÉE !' : '❤️ SAUVEGARDER';
                const btnBg = isSaved ? 'linear-gradient(135deg,#27ae60,#145c33)' : '#e74c3c';
                headerBar.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:20px; flex-wrap:wrap; gap:20px; width: 100%;">
                        <div style="display:flex; align-items:center; gap:20px; flex:1; min-width:300px;">
                            <div style="background:linear-gradient(135deg, ${team.rankColor}, #111); color:#fff; font-family:'Bangers', cursive; font-size:2.5rem; width:70px; height:70px; display:flex; align-items:center; justify-content:center; border-radius:15px; border:2px solid ${team.rankColor}; box-shadow:0 0 20px rgba(0,0,0,0.5); text-shadow:2px 2px 0 #000;" title="Score Global : ${team.score} points">
                                ${team.rank}
                            </div>
                            <div>
                                <h2 style="margin:0; font-family:'Bangers', cursive; font-size:2rem; color:var(--accent-gold); text-shadow:2px 2px 0 #000; letter-spacing:1px; line-height: 1.2;">
                                    ${team.teamName}
                                </h2>
                                <span style="font-size:0.9rem; color:#888; font-weight: 700;">PROPOSITION #${tIndex + 1} • SCORE: ${team.score}</span>
                            </div>
                        </div>
                        <div style="display:flex; gap:12px;">
                            <button style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:12px 20px; border-radius:12px; color:#fff; cursor:pointer; font-weight:bold; transition:0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'" onclick="toggleDetails(${team.id})">🔍 ANALYSER</button>
                            <button class="btn-like" style="background:${btnBg}; color:#fff; padding:12px 25px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-family:'Bangers', cursive; font-size:1.2rem; letter-spacing:1px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);" onclick="likeTeam(${tIndex})">${btnText}</button>
                        </div>
                    </div>
                `;
                teamSection.appendChild(headerBar);

                const unitsRow = document.createElement('div');
                unitsRow.className = 'team-units-row';
                unitsRow.style.display = 'flex';
                unitsRow.style.gap = '15px';
                unitsRow.style.flexWrap = 'wrap';
                unitsRow.style.justifyContent = 'center';
                unitsRow.style.padding = '10px 0';
                
                const isFromBox = team.source === 'Ma Box';
                const myBoxIds = JSON.parse(localStorage.getItem('dokkanBox')) || [];

                unitsRow.innerHTML += `<div style="display:flex;flex-direction:column;align-items:center;gap:8px; animation: fadeIn 0.5s ease-out;">${createDokkanCard(team.leader, { isInBox: isFromBox ? false : myBoxIds.includes(team.leader.id) })}<span style="font-size:0.8rem;color:var(--accent-gold);font-weight:900;letter-spacing:1px;">LEADER</span></div>`;

                team.members.forEach((m, idx) => {
                    // Mettre en évidence si le personnage est notre personnage central !
                    const isFocusMember = selectedLeader && m.id === selectedLeader.id && document.getElementById('build-mode-filter').value === 'MEMBER';
                    const memberLabel = isFocusMember ? '<span style="font-size:0.8rem;color:var(--accent-gold);font-weight:900;">⭐ FOCUS</span>' : '<span style="font-size:0.8rem;color:#888;font-weight:700;">MEMBRE</span>';
                    
                    unitsRow.innerHTML += `<div style="display:flex;flex-direction:column;align-items:center;gap:8px; animation: fadeIn 0.5s ease-out ${0.1 * (idx+1)}s both;">${createDokkanCard(m, { isInBox: isFromBox ? false : myBoxIds.includes(m.id) })}${memberLabel}</div>`;
                });

                unitsRow.innerHTML += `<div style="display:flex;flex-direction:column;align-items:center;gap:8px; animation: fadeIn 0.5s ease-out 0.6s both;">${createDokkanCard(team.friend, { isFriend: true, isInBox: isFromBox ? false : myBoxIds.includes(team.friend.id) })}<span style="font-size:0.8rem;color:var(--accent-blue);font-weight:900;letter-spacing:1px;">AMI</span></div>`;

                const detailsDiv = document.createElement('div');
                detailsDiv.className = 'team-details';
                detailsDiv.id = 'details-' + team.id;
                detailsDiv.style.display = 'none';
                detailsDiv.style.marginTop = '30px';

                let detailsHtml = '';
                const allUnits = [team.leader, ...team.members, team.friend];

                let availableMembers = [...team.members];

                function getBestPartner(mainUnit, candidates) {
                    let bestPartner = candidates[0];
                    let maxScore = -1;
                    candidates.forEach(c => {
                        let sharedLinks = c.links && mainUnit.links ? c.links.filter(l => mainUnit.links.includes(l)).length : 0;
                        let score = sharedLinks * 10;
                        if (c.roles && c.roles.includes("TANK")) score += 15; // Un tank en rotation c'est le top
                        if (score > maxScore) {
                            maxScore = score;
                            bestPartner = c;
                        }
                    });
                    return bestPartner;
                }
                let rot1Partner = getBestPartner(team.leader, availableMembers);
                availableMembers = availableMembers.filter(m => m.id !== rot1Partner.id);

                let rot2Partner = getBestPartner(team.friend, availableMembers);
                availableMembers = availableMembers.filter(m => m.id !== rot2Partner.id);

                let floaters = availableMembers;

                detailsHtml += `
                    <div style="margin-bottom: 30px; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.5);">
                        <h3 style="color: #3498db; font-family: 'Bangers', cursive; font-size: 2rem; margin: 0 0 20px 0; text-align: center; letter-spacing: 1px; text-shadow: 2px 2px 0 #000;">🔄 PLAN DE JEU : ROTATIONS OPTIMALES</h3>
                        
                        <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;">
                            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: center; border-top: 4px solid var(--accent-gold); flex: 1; min-width: 220px;">
                                <h4 style="color: var(--accent-gold); margin: 0 0 15px 0; font-family: 'Bangers', cursive; font-size: 1.3rem;">ROTATION 1</h4>
                                <div style="display: flex; justify-content: center; gap: 15px;">
                                    ${createDokkanCard(team.leader, { size: 'sm', isInBox: isFromBox ? false : myBoxIds.includes(team.leader.id) })}
                                    ${createDokkanCard(rot1Partner, { size: 'sm', isInBox: isFromBox ? false : myBoxIds.includes(rot1Partner.id) })}
                                </div>
                                <p style="font-size: 0.8rem; color:#aaa; margin-top:10px;">(Resteront en Slot 1 et 2)</p>
                            </div>

                            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: center; border-top: 4px solid var(--accent-blue); flex: 1; min-width: 220px;">
                                <h4 style="color: var(--accent-blue); margin: 0 0 15px 0; font-family: 'Bangers', cursive; font-size: 1.3rem;">ROTATION 2</h4>
                                <div style="display: flex; justify-content: center; gap: 15px;">
                                    ${createDokkanCard(team.friend, { size: 'sm', isInBox: isFromBox ? false : myBoxIds.includes(team.friend.id) })}
                                    ${createDokkanCard(rot2Partner, { size: 'sm', isInBox: isFromBox ? false : myBoxIds.includes(rot2Partner.id) })}
                                </div>
                                <p style="font-size: 0.8rem; color:#aaa; margin-top:10px;">(Resteront en Slot 1 et 2)</p>
                            </div>

                            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: center; border-top: 4px solid #888; flex: 1; min-width: 250px;">
                                <h4 style="color: #bbb; margin: 0 0 15px 0; font-family: 'Bangers', cursive; font-size: 1.3rem;">FLOTTEURS (Slot 3)</h4>
                                <div style="display: flex; justify-content: center; gap: 10px;">
                                    ${floaters.map(f => createDokkanCard(f, { size: 'sm', isInBox: isFromBox ? false : myBoxIds.includes(f.id) })).join('')}
                                </div>
                                <p style="font-size: 0.8rem; color:#aaa; margin-top:10px;">(Apparaissent tous les 3 tours)</p>
                            </div>
                        </div>
                    </div>
                    <h3 style="color: #fff; font-family: 'Bangers', cursive; font-size: 1.5rem; margin: 0 0 15px 10px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Détails de l'équipe :</h3>
                `;

                allUnits.forEach((m, uIndex) => {
                    if(!m) return;
                    const showBadge = isFromBox ? false : myBoxIds.includes(m.id);
                    
                    let roleText = "MEMBRE";
                    let roleColor = "#aaa";
                    if(uIndex === 0) { roleText = "LEADER"; roleColor = "var(--accent-gold)"; }
                    else if(uIndex === allUnits.length - 1) { roleText = "AMI LEADER"; roleColor = "var(--accent-blue)"; }

                    let sharedLinks = 0;
                    if (m.id !== team.leader.id && m.links && team.leader.links) {
                        sharedLinks = m.links.filter(l => team.leader.links.includes(l)).length;
                    }

                    detailsHtml += `
                        <div class="member-row" style="border-left-color: ${roleColor};">
                            <div style="flex-shrink:0;">${createDokkanCard(m, { size: 'md', isInBox: showBadge })}</div>
                            <div style="flex:1; margin-left: 20px;">
                                <h4 style="margin:0 0 8px 0; color:#fff; font-family:'Bangers', cursive; font-size:1.6rem; letter-spacing:1px;">
                                    ${m.name} <span style="font-size:1rem; color:${roleColor};">(${roleText})</span>
                                </h4>
                                <div class="synergy-pills">
                                    ${(m.id !== team.leader.id) 
                                        ? `<span class="pill">🔗 ${sharedLinks} Liens Partagés</span>` 
                                        : `<span class="pill" style="border-color:var(--accent-gold); color:var(--accent-gold);">👑 Référent d'Équipe</span>`
                                    }
                                    ${(m.roles && m.roles.length > 0) ? m.roles.map(r => `<span class="pill" style="border-color:#2ecc71; color:#2ecc71;">${r}</span>`).join('') : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                detailsDiv.innerHTML = detailsHtml;
                teamSection.appendChild(unitsRow);
                teamSection.appendChild(detailsDiv);
                resultsDiv.appendChild(teamSection);
            });
        }

        window.likeTeam = function(index) {
            const lastGeneratedTeam = generatedTeams[index];
            if (!lastGeneratedTeam) return;
            let teams = [];
            try { teams = JSON.parse(localStorage.getItem('dokkanSavedTeams')) || []; } catch(e) { teams = []; }
            const btn = document.querySelectorAll('.btn-like')[index];

            if (!lastGeneratedTeam.savedId) {
                const allMembers = lastGeneratedTeam.members.map(m => m.id);
                if (lastGeneratedTeam.friend) allMembers.push(lastGeneratedTeam.friend.id);
                const newTeamId = Date.now() + Math.floor(Math.random() * 1000);
                
                teams.push({
                    id: newTeamId,
                    name: lastGeneratedTeam.teamName,
                    leaderId: lastGeneratedTeam.leader.id,
                    memberIds: allMembers,
                    source: lastGeneratedTeam.source || 'Générateur',
                    date: lastGeneratedTeam.date || new Date().toLocaleDateString('fr-FR')
                });
                localStorage.setItem('dokkanSavedTeams', JSON.stringify(teams));
                lastGeneratedTeam.savedId = newTeamId; 
                if (btn) {
                    btn.innerHTML = '✅ SAUVEGARDÉE !';
                    btn.style.background = 'linear-gradient(135deg,#27ae60,#145c33)';
                    btn.style.color = '#ffffff';
                }
            } else {
                teams = teams.filter(t => t.id !== lastGeneratedTeam.savedId);
                localStorage.setItem('dokkanSavedTeams', JSON.stringify(teams));
                lastGeneratedTeam.savedId = null;
                if (btn) {
                    btn.innerHTML = '❤️ SAUVEGARDER';
                    btn.style.background = '#e74c3c';
                    btn.style.color = '#ffffff';
                }
            }
            sessionStorage.setItem('dokkanTempTeams', JSON.stringify(generatedTeams));
        };

        window.addEventListener('DOMContentLoaded', () => {
            const tempTeams = sessionStorage.getItem('dokkanTempTeams');
            if (tempTeams) {
                generatedTeams = JSON.parse(tempTeams);
                renderGeneratedTeams();
            }

            // --- LA MÉMOIRE DU LEADER RESTAURÉE ---
            const savedLeaderId = sessionStorage.getItem('dokkanTempLeaderId');
            if (savedLeaderId && savedLeaderId !== "null") {
                selectLeader(parseInt(savedLeaderId));
            }
        });
        
    </script>
</body>
</html>
